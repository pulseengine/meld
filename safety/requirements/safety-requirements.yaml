        - meld-core/src/dwarf.rs
      verification-method: test
      verification-description: >
        ls_d_3_multi_source_merge_round_trips_both_units (gimli-built
        two-source round-trip: units, files, lines, strp strings all
        survive relocation) plus the dwarf_passthrough multi-source
        policy test on the real lists.wasm fixture (287 units merge,
