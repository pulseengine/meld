# Safety Requirements
#
# Derived from STPA controller constraints and loss scenarios.
# Each requirement traces back to the STPA artifacts it addresses.
#
# Status values: draft | reviewed | approved | implemented | verified
#
# Verification methods:
#   - test: automated test (unit, integration, or property-based)
#   - proof: Rocq mechanized proof
#   - inspection: manual code review
#   - analysis: static analysis or model checking
#
# Format: rivet generic-yaml

artifacts:

  # ==========================================================================
  # Parsing requirements (from CC-P-* and LS-P-*)
  # ==========================================================================

  - id: SR-1
    type: requirement
    title: Complete core module extraction
    description: >
      The parser shall extract all core modules from a component,
      including those nested within component instances at any depth.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-P-1
      - type: derives-from
        target: LS-P-1
    fields:
      implementation: meld-core/src/parser.rs
      verification-method: test, proof
      verification-description: >
        Test with component containing 2+ nested instances; verify
        all core modules appear in parser output.
        Parser completeness proof (proofs/parser/).

  - id: SR-2
    type: requirement
    title: Complete import/export extraction
    description: >
      The parser shall extract every import and export entry declared
      by a component, preserving names, types, and kind.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-P-2
    fields:
      implementation: meld-core/src/parser.rs
      verification-method: test
      verification-description: >
        Round-trip test: parse component, verify import/export counts
        match wasmparser's independent count

  - id: SR-3
    type: requirement
    title: Correct Canonical ABI element size computation
    description: >
      canonical_abi_element_size shall return the correctly aligned
      element size for all Canonical ABI types, including records with
      heterogeneous field alignments.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-P-3
      - type: derives-from
        target: CC-P-5
      - type: derives-from
        target: LS-P-2
    fields:
      implementation: meld-core/src/parser.rs
      spec-reference: "Component Model commit deb0b0a, canonical ABI"
      verification-method: test, proof
      verification-description: >
        Property-based test with random record types; compare output
        to reference implementation of Component Model elem_size.
        Proof that canonical_abi_element_size matches Component Model
        spec definition (proofs/parser/ or proofs/adapter/).

  - id: SR-4
    type: requirement
    title: Reject malformed components
    description: >
      The parser shall reject components that do not pass wasmparser
      validation with feature flags locked to the Component Model
      baseline spec.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-P-6
      - type: derives-from
        target: LS-P-3
    fields:
      implementation: meld-core/src/parser.rs
      verification-method: test
      verification-description: >
        Test with intentionally malformed binaries (truncated, wrong
        magic, invalid sections); verify parser returns error

  # ==========================================================================
  # Resolution requirements (from CC-R-* and LS-R-*)
  # ==========================================================================

  - id: SR-5
    type: requirement
    title: Complete and correct import resolution
    description: >
      The resolver shall match every import to exactly one export with
      a matching interface name and compatible type. Ambiguous matches
      (multiple exports with the same name) shall produce an error.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-R-1
      - type: derives-from
        target: CC-R-3
      - type: derives-from
        target: LS-R-1
    fields:
      implementation: meld-core/src/resolver.rs
      verification-method: test, proof
      verification-description: >
        Test with unambiguous matches, ambiguous matches, and
        unresolvable imports; verify correct behavior for each.
        Resolver correctness proof (proofs/resolver/).

  - id: SR-6
    type: requirement
    title: Correct CopyLayout classification
    description: >
      The resolver shall classify each cross-component call parameter
      type into the correct CopyLayout. Types with inner pointer fields
      (strings, lists, records containing pointers) shall be classified
      as Elements with inner_pointers, not as Bulk.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-R-2
      - type: derives-from
        target: CC-R-4
      - type: derives-from
        target: CC-R-5
      - type: derives-from
        target: LS-R-2
    fields:
      implementation: meld-core/src/resolver.rs
      verification-method: test, proof
      verification-description: >
        Test CopyLayout for: list<u32> (Bulk), list<string> (Elements),
        list<record{name:string, val:u32}> (Elements with inner ptrs).
        CopyLayout consistency proof
        (proofs/transformations/adapter/copy_layout_proofs.v).

  - id: SR-7
    type: requirement
    title: Valid topological instantiation order
    description: >
      The resolver shall produce a topological order where every
      component appears after all components it imports from. Dependency
      cycles shall be detected and reported as an error (or handled by
      cycle-tolerant sort with documented semantics).
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-R-6
      - type: derives-from
        target: CC-R-7
      - type: derives-from
        target: LS-R-3
      - type: derives-from
        target: LS-R-4
    fields:
      implementation: meld-core/src/resolver.rs
      verification-method: test, proof
      verification-description: >
        Test with linear chains, diamonds, cycles, and self-imports;
        verify correct ordering or error.
        Topological sort correctness proof (proofs/resolver/).

  # ==========================================================================
  # Merge requirements (from CC-M-* and LS-M-*)
  # ==========================================================================

  - id: SR-8
    type: requirement
    title: Correct function base offset calculation
    description: >
      The merger shall compute each component's function base offset
      as the cumulative sum of all preceding components' total function
      counts (imports + defined functions).
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-M-3
      - type: derives-from
        target: LS-M-1
    fields:
      implementation: meld-core/src/merger.rs
      verification-method: test, proof
      verification-description: >
        Test with components having different import/defined function
        ratios; verify base offsets.
        Merge layout correctness proof (proofs/transformations/merge/).

  - id: SR-9
    type: requirement
    title: Complete instruction index rewriting
    description: >
      The rewriter shall remap indices in all instruction types that
      reference functions, memories, tables, globals, or types. This
      includes multi-index instructions (memory.copy, memory.init).
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-M-2
      - type: derives-from
        target: CC-M-4
      - type: derives-from
        target: CC-M-8
      - type: derives-from
        target: LS-M-2
      - type: derives-from
        target: LS-M-3
    fields:
      implementation: meld-core/src/rewriter.rs
      verification-method: test, proof
      verification-description: >
        Exhaustive test over all Wasm instruction variants that take
        index operands; verify each is remapped.
        Rewriter completeness proof (proofs/rewriter/).

  - id: SR-10
    type: requirement
    title: Correct segment reindexing
    description: >
      The merger shall reindex data segment memory indices, element
      segment table indices, and global indices in init expressions
      using the correct per-kind base offset.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-M-5
      - type: derives-from
        target: CC-M-6
    fields:
      implementation: meld-core/src/segments.rs
      verification-method: test, proof
      verification-description: >
        Test with components using global.get in data segment offsets;
        verify remapped indices.
        Segment reindexing proof (proofs/segments/).

  - id: SR-11
    type: requirement
    title: Component processing order matches resolver order
    description: >
      The merger shall process components in the same order as the
      resolver's topological sort output.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-M-7
    fields:
      implementation: meld-core/src/merger.rs
      verification-method: test
      verification-description: >
        Assert merger iteration order matches resolver output order

  # ==========================================================================
  # Adapter requirements (from CC-A-* and LS-A-*)
  # ==========================================================================

  - id: SR-12
    type: requirement
    title: Adapter generation for all pointer-passing cross-component calls
    description: >
      The adapter generator shall produce an adapter function for every
      resolved cross-component call whose signature includes pointer
      types (string, list, record with pointer fields) in multi-memory
      mode.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-1
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test
      verification-description: >
        Test that fusion of components with string/list parameters in
        multi-memory mode produces adapter functions

  - id: SR-13
    type: requirement
    title: Correct cabi_realloc targeting
    description: >
      The adapter shall call cabi_realloc using the post-merge function
      index of the destination component's allocator.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-2
      - type: derives-from
        target: CC-A-6
      - type: derives-from
        target: LS-A-1
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test
      verification-description: >
        Runtime test: fuse components, execute cross-component call
        with list argument, verify callee receives correct data

  - id: SR-14
    type: requirement
    title: Correct memory index usage in adapters
    description: >
      The adapter shall use the correct source and destination memory
      indices for all memory.copy, i32.load, and i32.store instructions.
      Source = caller's memory, destination = callee's memory for
      arguments; reversed for return values.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-4
      - type: derives-from
        target: CC-A-9
      - type: derives-from
        target: LS-A-2
      - type: derives-from
        target: LS-A-4
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test, proof
      verification-description: >
        Runtime test: fuse components, verify data arrives in correct
        memory after cross-component call.
        Adapter memory index proof (proofs/adapter/).

  - id: SR-15
    type: requirement
    title: Correct list copy length
    description: >
      The adapter shall compute list copy byte length as element_count
      multiplied by canonical_abi_element_size of the element type.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-5
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test, proof
      verification-description: >
        Test with list<record> types with known element sizes; verify
        copy length.
        Copy length proof (proofs/adapter/).

  - id: SR-16
    type: requirement
    title: Recursive inner pointer fixup
    description: >
      For list types whose elements contain pointer fields, the adapter
      shall emit a fixup loop that iterates over all elements and adjusts
      each inner pointer to reference the destination memory. The loop
      stride shall equal canonical_abi_element_size. The loop shall
      process exactly element_count iterations.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-3
      - type: derives-from
        target: CC-A-7
      - type: derives-from
        target: CC-A-11
      - type: derives-from
        target: LS-A-3
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test, proof
      verification-description: >
        Runtime test with list<string>: fuse, execute, verify all
        strings are accessible in callee.
        Fixup loop termination and correctness proof (proofs/adapter/).

  - id: SR-17
    type: requirement
    title: Correct string transcoding
    description: >
      String transcoding adapters shall produce valid output encoding
      for all valid input, including characters outside the BMP
      (surrogate pair handling for UTF-16).
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-8
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test
      verification-description: >
        Runtime oracles in tests/adapter_safety.rs, fused and executed
        under wasmtime: test_sr17_utf8_to_utf16_string_transcoding
        (BMP/ASCII round-trip) and, since the v0.31.0 audit,
        test_sr17_utf8_to_utf16_supplementary_plane_transcoding —
        "A😀" (U+0041 + U+1F600) must transcode to UTF-16 code units
        [0x0041, 0xD83D, 0xDE00], proving the supplementary-plane
        surrogate-pair branch of emit_utf8_to_utf16_transcode encodes
        the high/low surrogates correctly and advances the destination
        cursor by one then two units. The UTF-16 → UTF-8 reverse
        direction is covered by a non-BMP runtime round-trip
        (test_sr17_utf16_to_utf8_supplementary_plane_transcoding —
        U+1F600 surrogate pair D83D DE00 → UTF-8 F0 9F 98 80) and the
        Canonical-ABI lossy lone-surrogate U+FFFD substitution by
        test_sr17_utf16_to_utf8_lone_high_surrogate_replacement and
        test_sr17_utf16_to_utf8_midstring_lone_surrogate_replacement
        (lone high surrogate, terminal and mid-string, → U+FFFD
        EF BF BD), with malformed-input coverage in
        test_sr17_utf16_to_utf8_malformed_surrogate_matrix. The async
        cross-encoding path reuses the same shared decode/encode helpers
        and is independently exercised over the supplementary plane and
        a lone surrogate by inc2_async_utf16_to_utf8_param_* in
        tests/async_cross_encoding.rs (#272, post-v0.31.0-audit).

  - id: SR-18
    type: requirement
    title: Adapter instruction ordering
    description: >
      The adapter shall emit instructions in the correct order:
      cabi_realloc before memory.copy, memory.copy before callee
      function call.
    status: implemented
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-10
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: inspection, test
      verification-description: >
        Code review of adapter emission order.
        Runtime test exercises the full adapter path.

  # ==========================================================================
  # Cross-cutting requirements
  # ==========================================================================

  - id: SR-19
    type: requirement
    title: Deterministic output
    description: >
      Given identical input component bytes and identical FuserConfig,
      meld shall produce byte-identical output across invocations.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: SC-7
      - type: derives-from
        target: LS-CP-2
    fields:
      implementation: meld-core/src/lib.rs
      verification-method: test
      verification-description: >
        Run fusion twice with same inputs; assert byte-equal outputs

  - id: SR-20
    type: requirement
    title: Fail-fast on unresolvable state
    description: >
      If any stage encounters an unresolvable error (unresolved import,
      out-of-bounds index, malformed input), meld shall abort with a
      diagnostic error. Partial or best-effort output shall not be
      produced.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: SC-8
      - type: derives-from
        target: SC-9
    fields:
      implementation: meld-core/src/error.rs
      verification-method: test
      verification-description: >
        Test error paths: unresolved imports, malformed binaries,
        invalid indices

  # ==========================================================================
  # Requirements from gap analysis (SR-21 through SR-26)
  # ==========================================================================

  - id: SR-21
    type: requirement
    title: Valid P2 component wrapping
    description: >
      When OutputFormat::Component is selected, the wrapper shall produce
      a P2 component that passes wasm-tools validate. In multi-memory mode,
      each canon lower shall reference the correct memory index and
      cabi_realloc for the importing component. The stubs module shall
      define all memories needed by the fused module.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-W-1
      - type: derives-from
        target: CC-W-2
      - type: derives-from
        target: CC-W-3
      - type: derives-from
        target: LS-W-1
    fields:
      implementation: meld-core/src/component_wrap.rs
      verification-method: test
      verification-description: >
        Fuse multi-component fixture with OutputFormat::Component,
        validate with wasm-tools, run through wasmtime

  - id: SR-22
    type: requirement
    title: Conditional pointer copy for option/result/variant types
    description: >
      The adapter shall check the discriminant value of option, result,
      and variant types before copying pointer data. Pointer copy shall
      only occur when the discriminant indicates a variant case that
      contains pointer fields. When the discriminant indicates no pointer
      payload, the adapter shall skip the pointer copy entirely.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-12
      - type: derives-from
        target: LS-A-5
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test
      verification-description: >
        Runtime test: fuse components passing option<string> with
        both Some and None values; verify correct behavior for each

  - id: SR-23
    type: requirement
    title: Import deduplication type safety
    description: >
      The merger shall not deduplicate function imports that have the same
      module:field name but different type signatures. In multi-memory mode,
      imports from different components shall be kept separate even if they
      share the same name, to allow per-component canon lower configuration.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-M-9
      - type: derives-from
        target: CC-M-10
      - type: derives-from
        target: LS-M-4
    fields:
      implementation: meld-core/src/merger.rs
      verification-method: test
      verification-description: >
        Fuse two components importing same WASI function, verify separate
        import slots in multi-memory mode

  - id: SR-24
    type: requirement
    title: Correct retptr layout for variant return types
    description: >
      The adapter shall copy retptr return values using the correct
      canonical ABI layout (byte offsets and sizes) for each slot,
      accounting for alignment padding in variant payloads. Return area
      slot metadata (offset, size, is_pointer_pair) shall be computed by
      the resolver and used by the adapter for per-slot copy instructions.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-13
      - type: derives-from
        target: CC-R-9
      - type: derives-from
        target: LS-A-6
    fields:
      implementation:
        - meld-core/src/parser.rs
        - meld-core/src/resolver.rs
        - meld-core/src/adapter/fact.rs
      verification-method: test
      verification-description: >
        Runtime test: fuse components returning variant types with
        f64/i64 payloads via retptr; verify correct values

  - id: SR-25
    type: requirement
    title: Resource handle pass-through
    description: >
      The adapter shall pass resource handles through cross-component calls
      without modification (no pointer copy or fixup). Resource drop
      functions shall be forwarded directly.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-A-1
    fields:
      implementation: meld-core/src/adapter/fact.rs
      verification-method: test
      verification-description: >
        Runtime test with resource-using components; verify handles
        are valid after cross-component calls

  - id: SR-26
    type: requirement
    title: Complete component type index tracking
    description: >
      The parser shall track all entries in the component type index space
      including types defined in the type section, types introduced by
      imports, instance export aliases, and component exports. The type
      index mapping (get_type_definition) shall correctly resolve any
      valid type index to its definition.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: CC-P-9
      - type: derives-from
        target: CC-P-10
    fields:
      implementation: meld-core/src/parser.rs
      verification-method: test
      verification-description: >
        Test with component using types from imports, aliases, and
        exports; verify correct type index resolution

  # ==========================================================================
  # Attestation / supply-chain requirements (SR-27..SR-30, from H-6 / SC-6)
  #
  # Authored retroactively in the v0.31.0 traceability audit: these four
  # requirements had verification-status entries in traceability.yaml and
  # passing tests (attestation.rs test_sr27..test_sr30) since 2026-03, but
  # the requirement artifacts themselves were never written down.
  # ==========================================================================

  - id: SR-27
    type: requirement
    title: Attestation input hash integrity
    description: >
      For every input component added to a fusion, the attestation shall
      record a SHA-256 hash and byte size that match an independently
      computed digest and length of the exact input bytes. The recorded
      hash identifies the input for supply-chain verification; a
      mismatch means the attestation does not describe the artifact
      that was actually fused.
    status: verified
    tags: [stpa-derived, attestation, supply-chain]
    links:
      - type: derives-from
        target: SC-6
      - type: mitigates
        target: H-6
    fields:
      implementation: meld-core/src/attestation.rs
      verification-method: test
      verification-description: >
        attestation::tests::test_sr27_input_hash_integrity — builds an
        attestation over known input bytes and asserts the recorded
        hash equals an independently computed SHA-256 and the recorded
        size equals the actual byte length.

  - id: SR-28
    type: requirement
    title: Attestation configuration completeness
    description: >
      The attestation metadata shall record every FuserConfig field
      that influences the fused output (memory_strategy,
      address_rebasing, preserve_names, custom_sections,
      dwarf_handling, output_format), so an auditor can reconstruct
      the exact configuration used for the transformation. Adding a
      FuserConfig field without recording it in the attestation is a
      requirement violation; the sentinel test enumerates the required
      keys and must be updated in the same change.
    status: verified
    tags: [stpa-derived, attestation, supply-chain]
    links:
      - type: derives-from
        target: SC-6
      - type: mitigates
        target: H-6
    fields:
      implementation:
        - meld-core/src/attestation.rs
        - meld-core/src/lib.rs
      verification-method: test
      verification-description: >
        attestation::tests::test_sr28_config_completeness — sentinel
        list of required config keys checked against the
        tool_parameters map (wsc path) plus a serialization round-trip
        asserting metadata.memory_strategy survives to JSON.

  - id: SR-29
    type: requirement
    title: Attestation serialization round-trip
    description: >
      The attestation shall serialize to JSON and deserialize back with
      all fields intact and non-empty (version, attestation_id,
      transformation_type, timestamp, per-input hash/name/size, output
      hash/size, tool name/version, fusion metadata counts).
      Serialization failures shall surface as Err — to_bytes shall
      never silently substitute an empty payload, since a downstream
      consumer would accept the truncated attestation as valid.
    status: verified
    tags: [stpa-derived, attestation, supply-chain]
    links:
      - type: derives-from
        target: SC-6
      - type: mitigates
        target: H-6
    fields:
      implementation: meld-core/src/attestation.rs
      verification-method: test
      verification-description: >
        attestation::tests::test_sr29_attestation_round_trip —
        to_bytes → from_json round-trip with every field asserted
        populated; attestation::tests::test_to_bytes_returns_result —
        regression for the silent `{}` fallback bug (Result-based
        signature, output is valid non-empty JSON).

  - id: SR-30
    type: requirement
    title: Attestation output hash integrity
    description: >
      The attestation shall record a SHA-256 hash and byte size of the
      fused output that match an independently computed digest and
      length of the output bytes (the dual of SR-27: downstream
      consumers verify the artifact they received is the artifact the
      attestation describes).
    status: verified
    tags: [stpa-derived, attestation, supply-chain]
    links:
      - type: derives-from
        target: SC-6
      - type: mitigates
        target: H-6
    fields:
      implementation: meld-core/src/attestation.rs
      verification-method: test
      verification-description: >
        attestation::tests::test_sr30_output_hash_integrity — builds an
        attestation over known output bytes and asserts the recorded
        output hash equals an independently computed SHA-256 and the
        recorded size equals the actual byte length.

  # ==========================================================================
  # Requirements from weighted gap analysis (SR-31+)
  # ==========================================================================

  - id: SR-31
    type: requirement
    title: Multiply-instantiated module detection
    description: >
      The merger shall detect when the same core module is instantiated
      more than once within a component and return a diagnostic error.
      Silent production of corrupt output shall not occur. Future work
      may support multi-module component output (per cfallin's "simple
      component" proposal), but until then, fail-fast rejection is
      required.
    status: verified
    tags: [stpa-derived]
    links:
      - type: derives-from
        target: SC-8
      - type: derives-from
        target: SC-9
      - type: derives-from
        target: LS-M-5
    fields:
      implementation: meld-core/src/merger.rs
      verification-method: test
      verification-description: >
        Test with component that instantiates the same core module
        twice; verify merger returns an error
      references:
