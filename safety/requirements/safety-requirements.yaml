  - id: SR-36
    type: requirement
    title: Synthesised DWARF DIEs for meld-generated adapter functions
    description: >
      For every adapter function meld emits (cross-component lift/lower,
      `cabi_realloc` trampoline, `memory.copy` transcode loop), the
      output module shall carry a synthesised DIE pointing at a
      placeholder source file `<meld-adapter>` line N where N encodes
      the adapter class. Witness then surfaces these as "adapter"
      branches in its MC/DC line map rather than as un-attributed gaps.

      Delivered incrementally. Increment 1 (`dwarf::adapter_spans`):
      the enumeration seam — reports which fused-output code ranges are
      meld-generated (identified via the merger's synthetic-origin
      sentinels). Increment 2 (`dwarf::build_adapter_dwarf`): the
      synthetic-unit builder with a write→read round-trip oracle.
      Increment 3 (`dwarf::append_adapter_unit` + `remap_for_output`):
      pipeline emission under `DwarfHandling::Remap` — the synthetic
      unit rides the SAME `gimli::write::Dwarf` write as the remapped
      source units (one shared offset space; concatenating separately
      serialised `.debug_*` bytes would collide), and is emitted even
      when no input carries DWARF, so adapter attribution never depends
      on debug-built inputs. Increment 4 (v0.24.0): per-class
      `<meld-adapter>` lines. The merger tags synthetic functions
      (`MergedFunction::synthetic_kind`: handle-table, start wrapper,
      adapter shim, task-return shim) and the FACT generator tags each
      `AdapterFunction` (`AdapterClass`: direct, memory-copy, transcode,
      async); `dwarf::adapter_spans` additionally enumerates the FACT
      trampolines appended after the merged functions — previously a
      coverage gap leaving every FACT adapter unattributed. Stable line
      contract (`AdapterRole::adapter_line`): 1 unclassified, 2 direct,
      3 memory-copy, 4 transcode, 5 async, 6 handle-table, 7 start
      wrapper, 8 adapter shim, 9 task-return shim. Granularity
      correction vs #130's sketch ("transcode/cabi_realloc/lift/lower"):
      meld emits ONE fused trampoline per call site with lowering,
      allocation (a call to the callee's own cabi_realloc) and lifting
      inline, so the honest class unit is the trampoline kind.
    status: implemented
    tags: [roadmap, dwarf, witness-mc-dc, v0.23.0, v0.24.0]
    links:
      - type: derives-from
        target: "#130"
      - type: tracked-by
        target: "#144"
      - type: depends-on
        target: SR-35
    fields:
      implementation:
        - meld-core/src/dwarf.rs
        - meld-core/src/adapter/fact.rs
      verification-method: test+cross-repo
      verification-description: >
        Increment 1: `dwarf::tests::adapter_spans_*` pin enumeration at
        correct output ranges, disjoint from source ranges. Increment 2:
        `build_adapter_dwarf_attributes_ranges_to_meld_adapter` is the
        write→read round-trip oracle. Increment 3:
        `ls_d_2_rewrite_emits_source_and_adapter_units_in_one_write`
        (combined single-write: remapped source row AND adapter row
        coexist in one .debug_line) and tests/adapter_dwarf_e2e.rs
        (`ls_d_2_generated_start_wrapper_is_attributed_to_meld_adapter`:
        dwarf-less inputs whose fusion generates a start wrapper yield
        output attributing the wrapper to `<meld-adapter>:1` at an
        independently-derived real body address, plus a runtime guard
        that emission does not perturb behaviour). `verified` after the
        cross-repo witness re-run (v0.25.0 gate) confirms adapter ranges
        resolve to `<meld-adapter>` rather than `unknown` on a real
        fixture.
      milestone: v0.23.0

  # SR-37 was accidentally deleted by PR #226 (commit fafd00c); restored
