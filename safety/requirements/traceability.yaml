# Identified gaps
gaps:
  - id: GAP-1
    description: >
      L-3 (supply chain integrity) has hazard H-6 and constraint SC-6
      but no safety requirements or verification. Attestation module
      exists but is not covered by STPA-derived requirements.
    priority: medium
    action: >
      Add SR for attestation correctness; add tests for attestation
      custom section content.

  - id: GAP-2
    description: >
      L-5 (certification evidence) has no hazard. The STPA does not yet
      model the proof pipeline or the traceability chain as a controlled
      process.
    priority: low
    action: >
      Consider extending control structure to include the proof
      pipeline as a controller with feedback to the build system.

  - id: GAP-3
    description: >
      SR-6 now has unit tests for CopyLayout classification. SR-12,
      SR-13, SR-15, SR-16 still have no tests or proofs. These require
      runtime integration tests with real cross-component calls (wit-bindgen
      fixtures).
    priority: high
    action: >
      Priority for issue #10 (more wit-bindgen fixtures) and issue #11
      (Rocq proofs for CopyLayout).
