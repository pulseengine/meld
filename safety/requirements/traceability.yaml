# Traceability Matrix
#
# Maps the full chain: Loss -> Hazard -> Constraint -> UCA -> Scenario -> Requirement
# and forward: Requirement -> Implementation -> Verification
#
# This file is the authoritative record of traceability. A validation tool
# should check that:
#   1. Every hazard traces to at least one loss
#   2. Every constraint traces to at least one hazard
#   3. Every UCA traces to at least one hazard
#   4. Every scenario traces to at least one UCA
#   5. Every requirement traces to at least one constraint or scenario
#   6. Every requirement has at least one verification method
#   7. No dangling references (all IDs resolve)
#
# Last updated: 2026-06-11

# Reverse traceability: which requirements address each loss
loss-coverage:
  L-1:
    hazards: [H-1, H-2, H-3, H-4, H-5, H-8, H-9, H-10]
    requirements: [SR-1, SR-2, SR-3, SR-4, SR-5, SR-7, SR-8, SR-9, SR-10, SR-11, SR-12, SR-20, SR-21, SR-22, SR-23, SR-24, SR-25, SR-26, SR-31]
  L-2:
    hazards: [H-2, H-3, H-4]
    requirements: [SR-6, SR-9, SR-13, SR-14, SR-15, SR-16, SR-31]
  L-3:
    hazards: [H-6]
    requirements: [SR-27, SR-28, SR-29, SR-30]
  L-4:
    hazards: [H-7]
    requirements: [SR-19]
  L-5:
    hazards: []
    gap: "No explicit hazard for certification evidence loss"

