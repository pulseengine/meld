# wit-bindgen fixture coverage (14 fixtures × 3 levels = 42 integration tests)
wit-bindgen-fixtures:
  passing-all-3-levels:
    - numbers
    - strings
    - lists
    - records
    - variants
    - options
    - many-arguments
    - flavorful
    - results
    - lists-alias
    - strings-alias
    - strings-simple
  core-module-only:
    - resources  # P2 wrapping blocked on resource handles (SR-25)
  graceful-degradation:
    - fixed-length-lists  # Parser doesn't support 0x67 encoding

# Identified gaps
gaps:
  - id: GAP-1
    description: >
      L-3 (supply chain integrity) has hazard H-6 and constraint SC-6.
      Safety requirements SR-27 through SR-30 now cover input/output
      hash integrity, config completeness, and attestation round-trip.
      The silent-failure bug in to_bytes() has been fixed to return
      Result. Remaining gap: Rocq proofs for attestation properties.
    priority: low
    action: >
      Add Rocq proofs for attestation correctness properties.

  - id: GAP-2
    description: >
      L-5 (certification evidence) has no hazard. The STPA does not yet
      model the proof pipeline or the traceability chain as a controlled
      process.
    priority: low
    action: >
      Consider extending control structure to include the proof
      pipeline as a controller with feedback to the build system.

  - id: GAP-3
    description: >
      Adapter requirements SR-6, SR-12-16 have unit and runtime tests
      but lack Rocq proofs. 14 wit-bindgen fixtures (12 passing all 3
      levels) provide broad coverage but not formal guarantees.
    priority: medium
    action: >
      Add Rocq proofs for adapter correctness (issue #11).

  - id: GAP-4
    description: >
      SR-21 (P2 wrapping) and SR-23 (import dedup) are now implemented
      with targeted unit tests and runtime validation via flavorful fixture.
    priority: closed
    status: resolved

  - id: GAP-5
    description: >
      SR-25 (resource handles) has partial support — core module fusion
      works but P2 wrapping fails. Resources fixture exists but only
      passes core module validation level. Wrapper needs [resource-new],
      [resource-rep], [export]-prefixed module support.
    priority: high
    action: >
      Implement resource support in component_wrap.rs.

  - id: GAP-6
    description: >
      CTRL-WRAPPER (component_wrap.rs) has no Rocq proofs. Unit tests
      exist for stubs module, fixup module, and suffix stripping.
    priority: medium
    action: >
      Add Rocq proofs for wrapper correctness properties.

  - id: GAP-7
    description: >
      Multiply-instantiated modules (SR-31) have no detection. The
      merger silently produces corrupt output when the same core module
      is instantiated more than once. BA RFC #46 discussion (cfallin)
      identifies this as a fundamental component model capability that
      must be handled correctly, not just rejected.
    priority: critical
    action: >
      Immediate: fail-fast rejection in merger. Strategic: multi-module
      component output per cfallin's "simple component" proposal.
    references:
      - "BA RFC #46 discussion, cfallin 2026-03-10"
      - "safety/stpa/weighted-gap-analysis.md GAP-P2-1"

  - id: GAP-8
    description: >
      SR-17 (string transcoding) has zero test coverage for non-UTF-8
      encodings. No UTF-16, CompactUTF16, or surrogate pair tests exist.
      Cross-toolchain hazard XH-4 (string encoding disagreement) is
      unmitigated for non-UTF-8 paths.
    priority: high
    action: >
      Add transcoding tests with UTF-16 canonical option. Consider
      building a custom fixture with mixed string encodings.
