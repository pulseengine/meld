# Identified gaps
gaps:
  - id: GAP-1
    description: >
      L-3 (supply chain integrity) has hazard H-6 and constraint SC-6
      but no safety requirements or verification. Attestation module
      exists but is not covered by STPA-derived requirements.
    priority: medium
    action: >
      Add SR for attestation correctness; add tests for attestation
      custom section content.

  - id: GAP-2
    description: >
      L-5 (certification evidence) has no hazard. The STPA does not yet
      model the proof pipeline or the traceability chain as a controlled
      process.
    priority: low
    action: >
      Consider extending control structure to include the proof
      pipeline as a controller with feedback to the build system.

  - id: GAP-3
    description: >
      SR-6 has unit tests for CopyLayout. SR-12, SR-13, SR-15, SR-16 still
      lack direct tests or proofs. SR-22 and SR-24 now have runtime coverage
      via wit-bindgen fixtures (options, variants, flavorful). SR-12/13/15/16
      require additional targeted runtime tests.
    priority: high
    action: >
      Add targeted runtime tests for adapter generation (SR-12), cabi_realloc
      targeting (SR-13), list copy length (SR-15), and inner pointer fixup
      (SR-16). Issue #11 (Rocq proofs for CopyLayout) remains open.

  - id: GAP-4
    description: >
      SR-21 (P2 component wrapping) and SR-23 (import dedup type safety)
      have no tests or proofs. These require the multi-memory WASI import
      lowering fix (plan: Fix Multi-Memory WASI Import Lowering) before
      they can be verified.
    priority: high
    action: >
      Implement multi-memory WASI import lowering fix, then add runtime
      tests for P2 wrapping in multi-memory mode.

  - id: GAP-5
    description: >
      SR-25 (resource handle pass-through) has no tests. Resource-using
      components are not yet covered by wit-bindgen fixtures.
    priority: medium
    action: >
      Add wit-bindgen fixture with resource types; verify handle
      pass-through in runtime test.

  - id: GAP-6
    description: >
      CTRL-WRAPPER controller added to STPA but component_wrap.rs is not
      yet covered by formal proofs. Given the complexity of P2 component
      assembly, this is a significant verification gap.
    priority: medium
    action: >
      Consider adding Rocq proofs for component wrapper correctness,
      particularly for canon lower memory/realloc index selection.
