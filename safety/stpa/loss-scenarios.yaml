# STPA Step 4: Loss Scenarios
#
# A loss scenario describes the causal factors that can lead to unsafe
# control actions and to hazards. Two types:
#   a) Why would UCAs occur? (controller behavior, process model flaws)
#   b) Why would control actions be improperly executed? (control path,
#      controlled process)
#
# Each scenario traces from causal factor -> UCA -> hazard -> loss.
#
# Reference: STPA Handbook (Leveson & Thomas, 2018), Chapter 2

loss-scenarios:

  # ==========================================================================
  # Parser scenarios
  # ==========================================================================

  - id: LS-P-1
    title: Nested component instances not recognized
    uca: UCA-P-1
    hazards: [H-1, H-3]
    type: inadequate-control-algorithm
    scenario: >
      A component contains multiple nested component instances (each with
      their own core module). The parser's component traversal does not
      recurse into nested instances, extracting only the outermost core
      module. As a result, functions from inner instances are missing from
      the fused output [UCA-P-1], and calls to those functions are
      misrouted [H-3] or trap [H-1].
    causal-factors:
      - Parser implementation only handles single-instance components
      - Component Model nesting depth not bounded in parser loop

  - id: LS-P-2
    title: Canonical ABI size computation ignores alignment padding
    uca: UCA-P-5
    hazards: [H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      A record type has fields {u8, string} where u8 occupies 1 byte and
      the string pointer-pair requires 4-byte alignment. The
      canonical_abi_element_size function sums field sizes without padding
      (1 + 8 = 9) instead of computing the correctly padded size (4 + 8 =
      12). The adapter generator uses the wrong element size [UCA-P-5],
      computing incorrect copy lengths [H-4.1].
    causal-factors:
      - Alignment rounding not applied between fields
      - Missing alignment test cases for heterogeneous record types

  - id: LS-P-3
    title: Malformed component accepted due to wasmparser configuration
    uca: UCA-P-6
    hazards: [H-1, H-3]
    type: inadequate-process-model
    scenario: >
      The parser instantiates wasmparser::Validator with permissive
      feature flags that accept proposals not yet standardized. A
      component using a non-standard extension is accepted as valid. The
      resolver and merger operate on structures they were not designed to
      handle [UCA-P-6], producing incorrect index mappings [H-3].
    causal-factors:
      - Validator feature flags not locked to Component Model baseline
      - No integration test with adversarial/malformed inputs
    process-model-flaw: >
      Parser believes the component is valid because the validator
      accepted it, but the validator was configured too permissively.

  - id: LS-P-4
    title: Canonical-ABI size arithmetic overflows for nested fixed-length-list
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      A component declares nested `fixed-length-list` types whose
      individual lengths each pass per-level wasmparser validation
      (each ≤ MAX_WASM_FIXED_LIST_LENGTH = 65536) but whose product
      exceeds u32::MAX. `canonical_abi_size_unpadded`,
      `canonical_abi_element_size`, `flat_count`, and `flat_byte_size`
      in meld-core/src/parser.rs computed `element_size * len` (and
      record/tuple `+=` accumulators) on raw u32. With overflow-checks
      = on (debug builds), `meld fuse` panics on adversarial input
      (DoS [UCA-P-3]). With release defaults, the multiplication wraps
      to a small value (often 0) — the wrapped tiny size is then
      handed to the adapter generator, which emits realloc with a size
      that under-allocates by ~4 GiB while the loop count is the true
      (huge) flat count, producing an out-of-bounds write into the
      receiving component's linear memory at downstream exec time
      [H-4.1] and trampling caller-controlled offsets [H-2]. Detected
      by Kani harness
      meld-core::parser::tests::kani_fixed_size_list_size_no_overflow
      and PoC unit test
      meld-core::parser::tests::test_canonical_abi_size_fixed_size_list_saturates_on_overflow
      which exercises 65536×65536 = 2^32 and asserts the size does not
      wrap to 0. Fix lands in commit f0e981b: replace `*` with
      `saturating_mul`, `+`/`+=`/`.sum()` with `saturating_add`/
      `fold(0, saturating_add)`, and harden `align_up` against overflow
      when given a saturated u32::MAX size with align ≥ 2. Saturated
      u32::MAX makes downstream realloc/memory.copy fail safely instead
      of under-allocating.
    causal-factors:
      - >-
        Canonical-ABI size math used raw `u32 *` and `+=` with no
        overflow check; debug panics, release wraps
      - >-
        `align_up` did `(size + align - 1) & !(align - 1)` and
        overflowed when size was already saturated u32::MAX
      - >-
        No regression test for size saturation under nested
        `fixed-length-list` adversarial inputs
    status: approved
    priority: high

  # ==========================================================================
  # Resolver scenarios
  # ==========================================================================

  - id: LS-R-1
    title: Import matched to wrong export due to name normalization
    uca: UCA-R-3
    hazards: [H-1]
    type: inadequate-control-algorithm
    scenario: >
      Component A imports "wasi:http/handler@0.2.0" and two components
      (B and C) both export interfaces matching that name. The resolver
      selects the first match found during iteration, which may be
      component C instead of the intended component B. The caller invokes
      the wrong implementation [UCA-R-3], producing different behavior
      [H-1].
    causal-factors:
      - Resolver uses first-match strategy without disambiguation
      - No error on ambiguous matches

  - id: LS-R-2
    title: CopyLayout misclassifies pointer-containing record as Bulk
    uca: UCA-R-5
    hazards: [H-4, H-4.2]
    type: inadequate-process-model
    scenario: >
      A function parameter is list<record { name: string, value: u32 }>.
      The resolver's type analysis inspects only the outer list type and
      determines it can use Bulk copy (byte_multiplier). It does not
      recurse into the record's fields to discover the string field
      (pointer pair). The adapter performs a bulk memory.copy [UCA-R-5]
      without inner pointer fixup [H-4.2]. The callee dereferences
      string pointers that reference the source memory and reads garbage.
    causal-factors:
      - CopyLayout construction does not recurse into record fields
      - Missing test case for records with pointer fields inside lists
    process-model-flaw: >
      Resolver believes the type is a flat byte buffer because it only
      examined the outermost type structure.

  - id: LS-R-3
    title: Topological sort produces wrong order with diamond dependencies
    uca: UCA-R-6
    hazards: [H-5, H-1]
    type: inadequate-control-algorithm
    scenario: >
      Four components form a diamond dependency: A depends on B and C,
      both B and C depend on D. The topological sort visits B before D
      because the adjacency list iteration order places B first. Component
      B is instantiated before D [UCA-R-6], and B's imports from D bind
      to absent exports [H-5], causing the fused module to trap [H-1].
    causal-factors:
      - Topological sort does not enforce total ordering among peers
      - Adjacency list iteration depends on insertion order

  - id: LS-R-4
    title: Cycle detection fails on self-importing component
    uca: UCA-R-7
    hazards: [H-5, H-1]
    type: inadequate-control-algorithm
    scenario: >
      A component imports an interface that it also exports (self-cycle).
      The cycle detection logic checks for cycles of length >= 2 but not
      self-loops. The resolver produces an order without error [UCA-R-7],
      and the component's import binds to its own export before
      initialization completes [H-5].
    causal-factors:
      - Cycle detection skips self-edges in the dependency graph
      - No test for self-importing components

  # ==========================================================================
  # Merger scenarios
  # ==========================================================================

  - id: LS-M-1
    title: Function base offset does not account for imported functions
    uca: UCA-M-3
    hazards: [H-3, H-3.1]
    type: inadequate-control-algorithm
    scenario: >
      Component B has 3 imported functions and 5 defined functions.
      The merger computes B's function base offset by counting only
      defined functions from preceding components, ignoring imports.
      The base offset is too small by the number of imports. All
      function references in B are shifted incorrectly [UCA-M-3],
      and calls in B target wrong functions [H-3.1].
    causal-factors:
      - Base offset calculation uses defined_function_count instead of
        total_function_count (imports + defined)
      - Imports and defined functions share the same index space in
        WebAssembly but are counted separately in some data structures

  - id: LS-M-2
    title: Rewriter misses memory index in memory.copy instruction
    uca: UCA-M-8
    hazards: [H-2, H-3.2]
    type: inadequate-control-algorithm
    scenario: >
      The rewriter handles memory.load, memory.store, memory.size, and
      memory.grow by remapping the memory index. However, memory.copy
      takes two memory indices (source and destination). The rewriter
      only remaps the first argument, leaving the second as the original
      per-component index [UCA-M-8]. In multi-memory mode, the copy
      reads from or writes to the wrong memory [H-3.2, H-2].
    causal-factors:
      - memory.copy has unusual two-memory-index encoding
      - Rewriter instruction visitor does not match on MemoryCopy variant

  - id: LS-M-3
    title: Element segment type indices remapped with wrong offset
    uca: UCA-M-4
    hazards: [H-3, H-3.4]
    type: inadequate-control-algorithm
    scenario: >
      An element segment references function types for call_indirect.
      The merger applies the function index offset instead of the type
      index offset when rewriting the element segment's type index
      [UCA-M-4]. At runtime, call_indirect compares against the wrong
      type, causing spurious traps [H-3.4].
    causal-factors:
      - Element segment reindexing code uses func_base instead of type_base
      - Element segments and function references share similar syntax

  # ==========================================================================
  # Adapter scenarios
  # ==========================================================================

  - id: LS-A-1
    title: cabi_realloc function index not remapped after merge
    uca: UCA-A-6
    hazards: [H-2, H-4, H-4.3]
    type: inadequate-process-model
    scenario: >
      The adapter generator records the cabi_realloc function index from
      the resolver's pre-merge analysis. After merging, function indices
      are rebased, but the adapter generator uses the stale pre-merge
      index for cabi_realloc [UCA-A-6]. The adapter calls the wrong
      function, which may not be an allocator, causing memory corruption
      [H-4.3] or a trap.
    causal-factors:
      - Adapter generation uses resolver output directly without applying
        index maps from the merger
      - No assertion that cabi_realloc index is within valid range
    process-model-flaw: >
      Adapter generator believes the cabi_realloc index is still valid
      because it was correct before merging.

  - id: LS-A-2
    title: Memory indices swapped in cross-memory copy
    uca: UCA-A-4
    hazards: [H-2, H-4]
    type: inadequate-control-algorithm
    scenario: >
      The adapter copies argument data from caller (memory 0) to callee
      (memory 1). The code emits memory.copy with src_mem=1 and
      dst_mem=0 (swapped) [UCA-A-4]. The copy reads uninitialized data
      from the callee's memory and writes it into the caller's memory,
      corrupting both [H-2].
    causal-factors:
      - Source/destination parameter ordering inconsistency between
        memory.copy wasm encoding and the adapter's internal API
      - No runtime test that verifies data actually arrives in callee memory

  - id: LS-A-3
    title: Inner pointer fixup loop uses wrong element stride
    uca: UCA-A-7
    hazards: [H-4, H-4.2]
    type: inadequate-control-algorithm
    scenario: >
      For list<record { name: string, age: u32 }>, the adapter fixup loop
      must step through elements at stride = canonical_abi_element_size
      (which includes alignment padding). The loop uses the unpadded sum
      of field sizes as stride [UCA-A-7]. After the first element, the
      loop reads pointer fields at incorrect offsets, corrupting the
      callee's data [H-4.2].
    causal-factors:
      - Element stride computed from raw field sizes, not
        canonical_abi_element_size
      - canonical_abi_element_size returns correct value but is not used
        in the fixup loop

  - id: LS-A-4
    title: Return value pointers read from caller memory instead of callee
    uca: UCA-A-9
    hazards: [H-2, H-4]
    type: inadequate-process-model
    scenario: >
      A cross-component call returns a string via retptr convention. The
      adapter reads the (ptr, len) pair from the caller's memory index
      instead of the callee's memory index [UCA-A-9]. The values at those
      addresses in the caller's memory are unrelated data, causing the
      caller to interpret garbage as a string [H-2, H-4].
    causal-factors:
      - Return path uses caller_mem_idx variable instead of callee_mem_idx
      - Asymmetry between argument lowering (caller->callee) and result
        lifting (callee->caller) is error-prone
    process-model-flaw: >
      Adapter generator believes the return pointer is in the caller's
      memory because the caller is the one who will use the result.

  # ==========================================================================
  # Control path scenarios (type b: improperly executed control actions)
  # ==========================================================================

  - id: LS-CP-1
    title: Rewriter produces invalid wasm encoding
    type: control-path
    scenario: >
      The rewriter correctly determines the new index for an instruction
      but emits the LEB128 encoding incorrectly (e.g., uses signed
      encoding where unsigned is required). The wasm binary is malformed,
      causing validation failure or undefined behavior in the runtime.
    hazards: [H-1]
    causal-factors:
      - LEB128 encoding logic bug
      - No round-trip validation of rewritten instructions

  - id: LS-CP-2
    title: Hash map iteration order causes non-deterministic output
    type: control-path
    scenario: >
      The merger or resolver iterates over a HashMap to emit exports or
      resolve imports. HashMap iteration order is non-deterministic across
      runs (Rust's default hasher uses randomization). The output module
      contains sections in different orders [H-7], breaking
      reproducibility [L-4].
    hazards: [H-7]
    causal-factors:
      - Use of HashMap instead of BTreeMap or IndexMap for order-sensitive
        data
      - No byte-level reproducibility test

  # ==========================================================================
  # Additional adapter scenarios (discovered during gap analysis)
  # ==========================================================================

  - id: LS-A-5
    title: Conditional pointer not checked for option/result/variant
    uca: UCA-A-12
    hazards: [H-9, H-4]
    type: inadequate-control-algorithm
    scenario: >
      A cross-component call passes option<string> with value None. The
      adapter does not check the discriminant (0 = None, 1 = Some). It
      unconditionally copies 8 bytes as a (ptr, len) pair from after the
      discriminant. These bytes are uninitialized or belong to other data.
      The callee interprets them as a valid string pointer and traps or
      reads garbage [H-9]. Conversely, when the value is Some(string),
      an adapter that always skips the copy leaves the callee with a
      null pointer [H-4].
    causal-factors:
      - Adapter generator does not receive conditional_pointer_pairs from
        resolver
      - No if/end block emitted around pointer copy instructions
      - Missing test case for option<string> with None value

  - id: LS-A-6
    title: Retptr layout incorrect for variant return types
    uca: UCA-A-13
    hazards: [H-4, H-4.5]
    type: inadequate-control-algorithm
    scenario: >
      A cross-component call returns result<string, error-code> via retptr
      convention. The return area has slots: [discriminant: 1 byte at
      offset 0] [payload: 8 bytes at offset 4 due to alignment]. The
      adapter copies the return area as a flat sequence of i32 values
      (4 bytes each), missing the alignment gap between discriminant and
      payload. The callee reads the payload at the wrong offset [H-4.5],
      interpreting garbage as a string pointer.
    causal-factors:
      - Adapter uses flat_byte_size / 4 as number of i32 slots instead
        of computing per-slot layout from canonical ABI alignment rules
      - Return area slot offsets not communicated from resolver to adapter
      - Missing test case for variant retptr with alignment padding

  - id: LS-A-7
    title: Transcoding adapters emit unchecked i32.mul for realloc size
    uca: UCA-A-5
    hazards: [H-2, H-4, H-4.3]
    type: inadequate-control-algorithm
    scenario: >
      A cross-component call passes a string whose length is chosen by an
      untrusted caller. The transcoding adapters emitted in
      meld-core/src/adapter/fact.rs at emit_utf8_to_utf16_transcode
      (lines 2702-2712), emit_utf16_to_utf8_transcode (lines 3010-3020),
      and emit_latin1_to_utf8_transcode (lines 3335-3344) compute the
      destination allocation size as LocalGet(len); I32Const(K); I32Mul;
      Call(cabi_realloc); LocalSet(out_ptr) with K in {2, 3, 2}. The
      multiplication is performed in 32-bit wrapping arithmetic with no
      upper-bound check on len and no I32Eqz/BrIf guard on the
      cabi_realloc return value. For any len > u32::MAX / K the product
      wraps to a small alloc_size, cabi_realloc returns a short buffer
      (or null on OOM, which is also unchecked), and the transcode loop
      proceeds using the untouched full len as its bound, producing an
      out-of-bounds write into the callee's linear memory [UCA-A-5]. This
      corrupts callee memory at caller-chosen offsets [H-4.3] and covers
      address 0 on realloc failure [H-2]. Violates WebAssembly Component
      Model Canonical ABI (commit deb0b0a) Section 3.10 "Canonical
      Built-in Definitions", which requires the host to trap when
      realloc returns 0, and WebAssembly Core Specification Release 3.0
      Section 4.4.1 which defines i32.mul as modulo 2^32. Detected by
      Kani harness
      meld-core::adapter::fact::tests::kani_transcode_alloc_size_no_overflow_guard
      (counterexample at any len > u32::MAX / K) and PoC byte-scan
      meld-core::adapter::fact::tests::poc_transcode_adapter_emits_unchecked_mul
      which asserts presence of (a) I32Eqz/BrIf after the cabi_realloc
      Call and (b) a len upper-bound check before I32Mul; both
      assertions fail on the current emitter.
    causal-factors:
      - Allocation size computed via I32Mul without widening len to i64
        or bounding len < u32::MAX / K before the multiply
      - cabi_realloc return value stored directly into out_ptr with no
        I32Eqz/BrIf trap on null
      - Transcode loop bound is the untouched caller-supplied len, so a
        wrapped alloc_size does not shrink the number of bytes written
      - No emitter-level test asserting that every transcode adapter
        emits both the overflow guard and the realloc-null guard
    related-cve: CVE-2026-27572
    status: approved
    priority: critical

  - id: LS-A-8
    title: Inner-list rep_func selected by HashMap-iteration order
    uca: UCA-A-7
    hazards: [H-4, H-4.2]
    type: inadequate-control-algorithm
    scenario: >
      For a `list<record { x: borrow<A>, y: borrow<B> }>` (or any list
      whose element carries a `borrow<T>`), the params-area memcpy and
      param_copy_layouts paths in meld-core/src/adapter/fact.rs at
      `compute_adapter_options` (~line 960) and the
      `generate_params_ptr_adapter` emission (~line 1971) walked the
      inner_resources list and called `resource_rep_imports.values()
      .next()` to pick a `[resource-rep]` import for each element. When
      the callee imports more than one resource type, that pick is
      arbitrary (HashMap iteration order is not defined and varies
      across builds), so the adapter routinely emits the wrong rep_func
      for the borrow handle: a memory-pointer of resource A is then
      dereferenced inside the callee as if it were `_BRep<B>`. Result is
      silent rep-vs-handle confusion across the cross-component handle
      boundary [UCA-A-7] — the fused output is structurally valid wasm
      but semantically wrong [H-4 / H-4.2], which the discover prompt
      flags as the highest-amplification failure mode (downstream
      runtimes consume the silently-broken module). Detected by
      Kani harness
      meld-core::adapter::fact::tests::kani_inner_resource_picks_correct_rep_func
      and differential PoC fixture proving the wrong rep_func crashes a
      multi-resource list-borrow chain. Fix lands in commit f0e981b:
      `resolver::InnerResource` now carries a pre-resolved `rep_import`
      filled at site-requirements time via the callee's
      resource_type_to_import map; fact.rs looks up rep_func per type
      rather than via `.values().next()`. When a type lacks an import
      mapping the fixup is skipped with a warning rather than emitting
      a wrong-rep_func instruction.
    causal-factors:
      - Inner-resource fixup discarded `resource_type_id` and used
        `resource_rep_imports.values().next()` for every entry
      - HashMap iteration order is non-deterministic, so the same
        fixture could route correctly on one build and wrong on another
      - No emitter-level test asserting per-type rep_func selection
    status: approved
    priority: high

  # ==========================================================================
  # Merger scenario (discovered during gap analysis)
  # ==========================================================================

  - id: LS-M-4
    title: Import dedup conflates type-incompatible imports
    uca: UCA-M-9
    hazards: [H-10, H-1]
    type: inadequate-control-algorithm
    scenario: >
      Component A imports wasi:cli/environment.get-environment with type
      () -> list<(string, string)>. Component B imports the same function
      but with a different type index in the merged module. The merger
      deduplicates them into a single import using component A's type.
      Component B's call uses the wrong type, causing a type mismatch
      trap or silent argument corruption [H-10].
    causal-factors:
      - Dedup key is (module, field) without considering type signature
      - In multi-memory mode, same function may need different per-component
        canon lower with different memory/realloc

  # ==========================================================================
  # Wrapper scenario (discovered during gap analysis)
  # ==========================================================================

  - id: LS-W-1
    title: Wrapper hardcodes Memory(0) for all WASI import lowering
    uca: UCA-W-2
    hazards: [H-8, H-2]
    type: inadequate-process-model
    scenario: >
      A fused module has two memories (memory 0 for component A, memory 1
      for component B). The wrapper lowers all WASI imports with
      CanonicalOption::Memory(0). Component B calls get-environment which
      writes results to memory 0. Component B's code then reads the retptr
      from memory 1, where no data was written. The pointer is out of
      bounds or points to uninitialized data, causing a trap [H-8, H-2].
    causal-factors:
      - component_wrap.rs hardcodes CanonicalOption::Memory(0) at line 899
      - No per-import metadata (memory index, realloc index) passed from
        merger to wrapper
      - Single-memory assumption baked into stubs module construction
    process-model-flaw: >
      Wrapper assumes all imports use memory 0 because the original
      single-component wrapping only had one memory.
    status: fixed
    fix: >
      Multi-memory WASI import lowering (PR #20). Per-import Memory(N)
      and Realloc(N) via import_memory_indices/import_realloc_indices.

  - id: LS-M-5
    title: Multiply-instantiated module produces corrupt merged output
    uca: UCA-M-9
    hazards: [H-10, H-1]
    type: inadequate-process-model
    scenario: >
      A component instantiates the same core module twice (e.g., a shared
      utility module used by two sub-components). The merger processes the
      module index twice in its instantiation loop, creating duplicate
      function/memory/table entries. The second instance's functions receive
      index offsets computed from the first instance's space, but reference
      the first instance's memory. Cross-instance calls silently access
      wrong memory regions. Data corruption occurs without any error or
      trap [H-1, H-2, H-3].
    causal-factors:
      - Merger iterates instantiation_order without checking for duplicate
        module indices
      - No validation that each core module is instantiated at most once
      - Index maps (function_index_map, memory_index_map) silently
        overwrite entries for duplicate module indices
    process-model-flaw: >
      Merger assumes each module index appears at most once in the
      instantiation order. The component model spec allows multiple
      instantiations of the same module (with different import wiring),
      but the merger's index-space merging model does not account for this.
    status: open
    priority: critical
