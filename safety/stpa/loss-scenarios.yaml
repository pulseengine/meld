# STPA Step 4: Loss Scenarios
#
# A loss scenario describes the causal factors that can lead to unsafe
# control actions and to hazards. Two types:
#   a) Why would UCAs occur? (controller behavior, process model flaws)
#   b) Why would control actions be improperly executed? (control path,
#      controlled process)
#
# Each scenario traces from causal factor -> UCA -> hazard -> loss.
#
# Reference: STPA Handbook (Leveson & Thomas, 2018), Chapter 2

loss-scenarios:

  # ==========================================================================
  # Parser scenarios
  # ==========================================================================

  - id: LS-P-1
    title: Nested component instances not recognized
    uca: UCA-P-1
    hazards: [H-1, H-3]
    type: inadequate-control-algorithm
    scenario: >
      A component contains multiple nested component instances (each with
      their own core module). The parser's component traversal does not
      recurse into nested instances, extracting only the outermost core
      module. As a result, functions from inner instances are missing from
      the fused output [UCA-P-1], and calls to those functions are
      misrouted [H-3] or trap [H-1].
    causal-factors:
      - Parser implementation only handles single-instance components
      - Component Model nesting depth not bounded in parser loop

  - id: LS-P-2
    title: Canonical ABI size computation ignores alignment padding
    uca: UCA-P-5
    hazards: [H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      A record type has fields {u8, string} where u8 occupies 1 byte and
      the string pointer-pair requires 4-byte alignment. The
      canonical_abi_element_size function sums field sizes without padding
      (1 + 8 = 9) instead of computing the correctly padded size (4 + 8 =
      12). The adapter generator uses the wrong element size [UCA-P-5],
      computing incorrect copy lengths [H-4.1].
    causal-factors:
      - Alignment rounding not applied between fields
      - Missing alignment test cases for heterogeneous record types

  - id: LS-P-3
    title: Malformed component accepted due to wasmparser configuration
    uca: UCA-P-6
    hazards: [H-1, H-3]
    type: inadequate-process-model
    scenario: >
      The parser instantiates wasmparser::Validator with permissive
      feature flags that accept proposals not yet standardized. A
      component using a non-standard extension is accepted as valid. The
      resolver and merger operate on structures they were not designed to
      handle [UCA-P-6], producing incorrect index mappings [H-3].
    causal-factors:
      - Validator feature flags not locked to Component Model baseline
      - No integration test with adversarial/malformed inputs
    process-model-flaw: >
      Parser believes the component is valid because the validator
      accepted it, but the validator was configured too permissively.

  - id: LS-P-4
    title: Canonical-ABI size arithmetic overflows for nested fixed-length-list
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      A component declares nested `fixed-length-list` types whose
      individual lengths each pass per-level wasmparser validation
      (each ≤ MAX_WASM_FIXED_LIST_LENGTH = 65536) but whose product
      exceeds u32::MAX. `canonical_abi_size_unpadded`,
      `canonical_abi_element_size`, `flat_count`, and `flat_byte_size`
      in meld-core/src/parser.rs computed `element_size * len` (and
      record/tuple `+=` accumulators) on raw u32. With overflow-checks
      = on (debug builds), `meld fuse` panics on adversarial input
      (DoS [UCA-P-3]). With release defaults, the multiplication wraps
      to a small value (often 0) — the wrapped tiny size is then
      handed to the adapter generator, which emits realloc with a size
      that under-allocates by ~4 GiB while the loop count is the true
      (huge) flat count, producing an out-of-bounds write into the
      receiving component's linear memory at downstream exec time
      [H-4.1] and trampling caller-controlled offsets [H-2]. Detected
      by Kani harness
      meld-core::parser::tests::kani_fixed_size_list_size_no_overflow
      and PoC unit test
      meld-core::parser::tests::test_canonical_abi_size_fixed_size_list_saturates_on_overflow
      which exercises 65536×65536 = 2^32 and asserts the size does not
      wrap to 0. Fix lands in commit f0e981b: replace `*` with
      `saturating_mul`, `+`/`+=`/`.sum()` with `saturating_add`/
      `fold(0, saturating_add)`, and harden `align_up` against overflow
      when given a saturated u32::MAX size with align ≥ 2. Saturated
      u32::MAX makes downstream realloc/memory.copy fail safely instead
      of under-allocating.
    causal-factors:
      - >-
        Canonical-ABI size math used raw `u32 *` and `+=` with no
        overflow check; debug panics, release wraps
      - >-
        `align_up` did `(size + align - 1) & !(align - 1)` and
        overflowed when size was already saturated u32::MAX
      - >-
        No regression test for size saturation under nested
        `fixed-length-list` adversarial inputs
    status: approved
    priority: high

  - id: LS-P-5
    title: Truncated component-section input panics parser slice
    uca: UCA-P-3
    hazards: [H-1]
    type: inadequate-control-algorithm
    scenario: >
      A truncated/adversarial component binary contains a
      `Payload::ModuleSection` (or similarly a depth-0
      Component{Import,Type,Alias}Section) whose declared section length
      extends past the end of the input buffer. `wasmparser` reports the
      `unchecked_range` (or `reader.range()`) verbatim — the name is
      explicit that no bounds check has been performed. The parser in
      `meld-core/src/parser.rs` then sliced
      `_full_bytes[range.start..range.end]` directly, producing a Rust
      slice-index panic such as "range end index 17 out of range for
      slice of length 15" [UCA-P-3]. The whole `meld fuse` process
      aborts on adversarial input, denying service and surfacing as a
      hard panic rather than a clean diagnostic [H-1]. cargo-fuzz's
      `fuzz_parse_component` smoke target found this within seconds of
      its first 60-second run (PR #114). Fix for issue #118: a
      `checked_section_slice(full, &range, "<section>")` helper
      validates `range.start <= range.end <= full.len()` and returns
      `Error::ParseError("<section> range out of bounds …")` otherwise,
      applied at the four affected sites
      (`Payload::ModuleSection.unchecked_range` plus the depth-0
      capture sites for ComponentImport, ComponentType, and
      ComponentAlias sections). Failing fast preserves the malformed-
      input semantics without silently truncating a caller-controlled
      length, which `min`-clamping would do. Regression test
      `meld-core::parser::tests::test_parser_rejects_truncated_module_section_issue_118`
      asserts both the validating and non-validating parsers return
      `Err` rather than panic. The libFuzzer reproducer is committed at
      `fuzz/corpus/fuzz_parse_component/crash-58e2560292606f3a49bde7edf9b939509a56cb32`.
    causal-factors:
      - >-
        Direct slice indexing of a wasmparser-reported byte range
        without first validating it against the input length
      - >-
        `unchecked_range` field name signals the contract but the
        previous code did not honor it
      - >-
        No fuzz target for the parser entry point until PR #114; the
        bug had been latent
    process-model-flaw: >
      Parser assumed wasmparser would only yield in-bounds ranges, but
      `unchecked_range` is by spec post-bounds-check responsibility of
      the caller.
    status: approved
    priority: high

  - id: LS-P-6
    title: Area-size accumulators wrap, undoing canonical_abi_size_unpadded saturation
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/parser.rs::params_area_byte_size` and
      `return_area_byte_size` compute the canonical-ABI memory size of a
      component function's params / results by accumulating each field:
      `size = align_up(size, align); size += canonical_abi_size_unpadded(ty)`.
      The `+=` is a bare wrapping add. `canonical_abi_size_unpadded`
      itself **saturates** to `u32::MAX` for a pathologically large
      `fixed-length-list` (the LS-P-4 fix, which also hardened
      `align_up` against a saturated input). But the LS-P-4 fix did not
      reach these two cross-field accumulators: once a first field
      saturates `size` to `u32::MAX`, the next field's `size +=
      canonical_abi_size_unpadded(ty)` overflows — a debug build panics
      ("attempt to add with overflow"), a release build wraps `u32::MAX`
      down to a small value. A function with params
      `(fixed-length-list<f64, 2^29>, u32)` makes `params_area_byte_size`
      wrap from `u32::MAX` to ~3. The resolver stores that wrapped value
      as `AdapterRequirements::params_area_byte_size`; the FACT adapter
      generator passes it to `cabi_realloc`, allocating a params buffer
      a few bytes long and then copying every parameter into it —
      an out-of-bounds write into the callee's linear memory
      [UCA-P-3 / H-2 caller-controlled offsets / H-4.1 OOB write].
      The wasm validator does not catch it; the under-sized realloc and
      the copy both type-check. The sibling accumulators inside
      `canonical_abi_size_unpadded` (its Record and Tuple arms) already
      use `saturating_add` — these two area-size loops were simply
      missed by LS-P-4. Fix replaces both `+=` sites with
      `size = size.saturating_add(...)`, so a saturated field keeps the
      whole area size at a near-`u32::MAX` (un-allocatable) value and
      the downstream `cabi_realloc` fails safely instead of
      under-allocating. Surfaced by the mythos-auto delta-pass on
      PR #179. Confirmed by PoC
      `meld-core::parser::tests::ls_p_6_area_byte_size_saturates_across_fields`,
      which panics today on the bare `+=` and asserts a saturated
      result after the fix; the nearest primitive-layer proof is
      LS-P-4's `kani_fixed_size_list_size_no_overflow` Kani harness
      (the symbolic surface here is a `&[(String, ComponentValType)]`
      slice, which CBMC cannot enumerate directly).
    causal-factors:
      - >-
        `canonical_abi_size_unpadded` was hardened to saturate (LS-P-4)
        but its two callers' cross-field `+=` accumulators were not,
        re-introducing the wrap at the next layer up
      - >-
        Bare `+=` used where the sibling Record/Tuple accumulators
        inside the same module already use `saturating_add` —
        an inconsistency that hid the gap
      - >-
        No regression test exercised a multi-field params/results area
        whose first field saturates the size accumulator
    process-model-flaw: >
      The LS-P-4 fix's model was "the size primitives saturate", but the
      saturation guarantee is only end-to-end if every accumulator that
      consumes a saturated value also saturates.
    status: approved
    priority: high

  - id: LS-P-7
    title: Conditional-pointer CopyLayout computed for composite, not the leaf
    uca: UCA-P-3
    hazards: [H-4, H-4.1, H-4.2]
    type: inadequate-process-model
    scenario: >
      `meld-core/src/parser.rs::collect_conditional_pointers` (flat-param
      path) and `collect_conditional_result_pointers` (retptr byte-offset
      path) emit one `ConditionalPointerPair` per pointer leaf inside an
      `option<T>` / `result<T,E>` / `variant` payload. They correctly
      enumerated each leaf's *position* by recursing through the payload
      with `collect_pointer_positions` / `collect_pointer_byte_offsets`,
      but then computed the `CopyLayout` exactly once by calling
      `copy_layout_for_string_or_list_at(<whole payload type>)` and
      assigning that single layout to every position. `copy_layout` only
      special-cases a bare `string` / `list`; any composite payload
      (`record`, `tuple`, `fixed-length-list`) falls to the
      `_ => CopyLayout::Bulk { byte_multiplier: 1 }` fallback. So for a
      param `option<tuple<u32, list<u64>>>` or a result
      `result<record { items: list<u64> }, E>`, the `list<u64>` leaf —
      whose correct layout is `Bulk { byte_multiplier: 8 }` — was tagged
      `Bulk { byte_multiplier: 1 }` [UCA-P-3]. The FACT adapter then
      copies `len * 1` bytes for that conditional list instead of
      `len * 8`: a 7/8 silent under-copy / truncation of caller data
      [H-4 / H-4.1]. Worse, when the leaf is a pointer-containing list
      (e.g. `list<string>`) whose correct layout is `CopyLayout::Elements`
      with recursive inner-pointer fixup, the composite fallback collapses
      it to flat `Bulk`, so the adapter performs a raw byte copy and omits
      the inner pointer fixup entirely — the callee then dereferences
      string/list pointers that still address the *source* memory
      [H-4.2], the same misclassification class as LS-R-2 but on the
      conditional (option/result/variant) payload path rather than the
      list-element path. The wasm validator does not catch it; the
      under-sized copy type-checks. Fix adds
      `collect_pointer_positions_with_layout` /
      `collect_pointer_byte_offsets_with_layout`, which carry the
      `CopyLayout` of each String/List leaf alongside its position, so
      every `ConditionalPointerPair` gets the layout of *its own* leaf
      rather than the enclosing composite's `Bulk{1}` fallback; the now
      dead `copy_layout_for_string_or_list_at` shim is removed. Surfaced
      by the mythos-auto delta-pass on PR #179. Confirmed by PoC
      `meld-core::parser::tests::ls_p_7_conditional_pointer_layout_is_per_leaf_not_per_composite`,
      which exercises both the flat-param and retptr paths and asserts the
      `list<u64>` leaf keeps an 8× multiplier; the layout primitive it
      defends, `copy_layout`, is already covered by the SR-6 / LS-R-2
      `copy_layout` unit tests in `resolver.rs` (the symbolic surface here
      is a nested `ComponentValType` tree, which CBMC cannot enumerate
      directly).
    causal-factors:
      - >-
        `copy_layout` was called once on the whole payload type instead
        of once per pointer leaf, so its `_ => Bulk{1}` fallback masked
        every composite payload
      - >-
        `collect_pointer_positions` returned bare positions, discarding
        the leaf type needed to compute the correct per-leaf layout
      - >-
        No regression test exercised a conditional payload whose pointer
        leaf was nested inside a record / tuple / fixed-length-list
    process-model-flaw: >
      The code's model was "a conditional payload is one pointer object",
      but a composite payload holds several independent pointer leaves,
      each needing its own CopyLayout — the same level-of-detail mistake
      as LS-R-2, here on the option/result/variant path.
    status: approved
    priority: high

  - id: LS-P-8
    title: Record/tuple field-walk adds unpadded child size, undercounting layout
    uca: UCA-P-3
    hazards: [H-4, H-4.1, H-4.2]
    type: inadequate-control-algorithm
    scenario: >
      The Component Model canonical ABI specifies record/tuple layout as
      `s = 0; for each field f: s = align_to(s, alignment(f)); s += size(f);
      return align_to(s, alignment(record))`, where `size(f)` for an
      aggregate field is the field's *full padded* canonical size
      (`align_to(unpadded_inner, alignment(f))`). In `meld-core/src/parser.rs`
      that full padded size is `canonical_abi_element_size`;
      `canonical_abi_size_unpadded` is the outer size *without* the
      type's own trailing align-up. Roughly 25 field-walk sites — the
      `Record` and `Tuple` match arms of `canonical_abi_size_unpadded`,
      `collect_pointer_byte_offsets`,
      `collect_pointer_byte_offsets_with_layout` (added by LS-P-7),
      `collect_conditional_result_pointers`,
      `collect_return_area_type_slots`, `collect_resource_byte_positions`,
      `element_inner_pointers`, `element_inner_resources`, plus the
      top-level params/results walks in `params_area_byte_size`,
      `return_area_byte_size`, `pointer_pair_params_byte_offsets`,
      `pointer_pair_result_offsets`, `params_area_slots`,
      `return_area_slots`, `resource_params_area_positions`,
      `resource_result_positions`, and
      `conditional_pointer_pair_result_positions` — advanced the running
      offset by `canonical_abi_size_unpadded(field)` instead of
      `canonical_abi_element_size(field)`. The per-field
      `align_up(offset, next_field_align)` does NOT re-absorb the
      preceding field's omitted trailing pad whenever the next field has
      *smaller* alignment than the preceding aggregate. So a
      `tuple<record { a: u32, b: u8 }, u8>` came out with running
      `_unpadded` = 6 and `element_size` = 8 instead of the spec's
      9 / 12; a `list<u32>` following `record { u32, u8 }` was located
      at offset 5 instead of the spec's 8. Wrong field offsets propagate
      into `pointer_pair_*` and the FACT adapter's list-copy / inner
      pointer-fixup emission, so the adapter reads pointer pairs from
      misaligned offsets and copies bytes using stale offsets [UCA-P-3 /
      H-4 / H-4.1 wrong byte length, H-4.2 fixup walks wrong fields].
      `params_area_byte_size` / `return_area_byte_size` under-size the
      adapter buffer for the same reason: a `cabi_realloc` sized for the
      under-counted total then receives every parameter, and the trailing
      bytes spill past the buffer (the LS-P-6 hazard class, but reached
      via the wrong field-size primitive rather than the cross-field
      accumulator wrap). Fix replaces `canonical_abi_size_unpadded(field)`
      with `canonical_abi_element_size(field)` at the 25 record/tuple
      field-walk sites; `canonical_abi_size_unpadded` itself still
      returns the outer type minus its own trailing pad (that contract is
      unchanged — `canonical_abi_element_size` re-adds the pad). Surfaced
      by the mythos-auto delta-pass on PR #179; the discover step
      mis-located the bug as the `Option` / `Variant` / `Result` payload
      contribution (which is actually spec-correct — those arms already
      use `canonical_abi_element_size` for payloads). The actual location
      was corrected by independent clean-room verification. Confirmed by
      PoC `meld-core::parser::tests::ls_p_8_record_tuple_field_accumulation_uses_padded_field_size`,
      which asserts `canonical_abi_element_size(tuple<record{u32,u8},u8>)`
      = 12, `params_area_byte_size` for the same shape = 20, and a
      `list<u32>` field after `record{u32,u8}` sitting at byte offset 8.
    causal-factors:
      - >-
        `canonical_abi_size_unpadded` and `canonical_abi_element_size`
        are two adjacent primitives differing only by the type's own
        trailing align-up; the wrong one was called at the per-field
        accumulation step and the function name made it look correct
      - >-
        25 independent field-walks rather than a single shared helper
        replicated the same wrong call across the file
      - >-
        No regression test exercised a record/tuple containing a padded
        aggregate followed by a lower-aligned trailing field — the only
        type shape that surfaces the bug
    process-model-flaw: >
      The code's model was "advance by the inner type's `_unpadded` size
      because we'll align the next field anyway", but the next field's
      `align_up` only re-absorbs the trailing pad when the next field's
      alignment is at least as large as the preceding aggregate's own
      alignment.
    status: approved
    priority: high

  - id: LS-P-9
    title: total_flat_params uses non-saturating Iterator::sum across params
    uca: UCA-P-3
    hazards: [H-2, H-4]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/parser.rs::total_flat_params` returns the total
      number of flat (core wasm) values a component function's params
      flatten to. The Component Model canonical ABI uses this count to
      pick the calling convention: `<= MAX_FLAT_PARAMS` (16) means the
      flat convention (each param a core value); `>` means the
      params-ptr convention (a single i32 pointer to a params buffer in
      linear memory). The function summed per-param `flat_count` values
      with `Iterator::sum::<u32>()`. `flat_count` for a `FixedSizeList`
      is `flat_count(elem).saturating_mul(len)` (LS-P-4 saturation
      contract), so a nested `FixedSizeList` can produce a per-param
      `flat_count` of `u32::MAX`. A bare `sum()` over u32 then panics
      in debug builds on `u32::MAX + 1`; a release build wraps the
      total to a small value. The wrapped total then compares
      `<= MAX_FLAT_PARAMS` and the adapter selects the **flat** calling
      convention for a function that genuinely needs **params-ptr**.
      The fused output then passes the param as a sequence of flat core
      values that the wasm engine cannot represent (a multi-billion-arg
      function call), or — worse, when the wrapped count happens to fit
      a valid flat signature — silently emits the *wrong* calling
      convention, so the callee reads its parameters from the wrong
      ABI slot [UCA-P-3]; the adapter's matching `params_area_*` and
      `pointer_pair_params_*` paths use the params-ptr layout while the
      function signature uses flat, so call-site lowering and
      callee-side lifting disagree [H-2 caller-controlled offsets /
      H-4 wrong adapter]. The sibling area-size accumulators inside
      `params_area_byte_size` / `return_area_byte_size` already use
      `saturating_add` (LS-P-6) — this calling-convention picker was
      simply missed. Fix replaces `.sum()` with
      `.fold(0u32, u32::saturating_add)`. Surfaced by the mythos-auto
      delta-pass on PR #179. Confirmed by PoC
      `meld-core::parser::tests::ls_p_9_total_flat_params_saturates_across_params`,
      which builds a nested FixedSizeList param whose `flat_count`
      saturates to `u32::MAX` plus a second param of `flat_count >= 1`
      and asserts the total stays near `u32::MAX` rather than wrapping.
      The nearest primitive-layer proof is LS-P-4's
      `kani_fixed_size_list_size_no_overflow` Kani harness; the
      symbolic surface here is a `&[(String, ComponentValType)]` slice
      which CBMC cannot enumerate directly.
    causal-factors:
      - >-
        `Iterator::sum::<u32>()` panics on overflow in debug and wraps
        in release — neither matches the LS-P-4 saturating contract of
        the values it sums
      - >-
        The calling-convention picker was hardened against per-type
        saturation (LS-P-4) but not against cross-param accumulation —
        the same gap LS-P-6 fixed for the area-size accumulators
      - >-
        No regression test exercised a params list whose first param's
        `flat_count` already saturated to `u32::MAX`
    process-model-flaw: >
      LS-P-4's model was "the size/count primitives saturate", but the
      saturation guarantee is only end-to-end if every accumulator that
      consumes a saturated value also saturates — the same model-flaw
      class as LS-P-6, here on the flat-param-count side rather than
      the area-byte-size side.
    status: approved
    priority: high

  - id: LS-P-10
    title: Nested conditional pointer pair omits outer-discriminant guard
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.2]
    type: inadequate-process-model
    scenario: >
      For a pointer-containing type nested inside an option/result/variant
      arm — for instance `result<option<string>, u32>` —
      `meld-core/src/parser.rs::collect_conditional_pointers` (flat-param
      path) and `collect_conditional_result_pointers` (retptr byte-offset
      path) emitted a `ConditionalPointerPair` guarded only on the
      *innermost* discriminant. For the example, the string's pair carried
      `discriminant_position = base+1, discriminant_value = 1` (the
      option's Some byte), but no guard on the outer Result discriminant
      at `base`. The FACT adapter (`meld-core/src/adapter/fact.rs`, four
      consumer loops covering flat-param, flat-result, retptr-param, and
      retptr-result paths) loaded that single discriminant and fired
      `cabi_realloc` + `memory.copy` whenever it equalled the expected
      value. When the runtime value was `Err(v: u32)`, the byte at
      `base+1` did not hold an option discriminant — it held the `u32`
      payload. If those bytes happened to read as `1`, the adapter
      sampled adjacent slots (the next `(ptr, len)` pair worth of bytes
      from the caller's stack / params buffer / return area) as a
      string pointer pair and copied `len * 1` bytes from
      caller-controlled `ptr` into a freshly allocated callee buffer,
      then handed the forged pointer to the callee. That is an
      **arbitrary cross-component memory read** with attacker-controlled
      length and source address [UCA-P-3 / H-2 caller-controlled offsets /
      H-4 wrong adapter / H-4.2 missing pointer fixup gate]. The same
      defect applied symmetrically to every nesting where an outer
      option/result/variant payload contains a pointer-bearing
      option/result/variant (e.g. `option<option<string>>`,
      `variant { a(option<string>), b(u32) }`). Surfaced by the
      mythos-auto delta-pass on PR #179; independent clean-room
      verification (validator traced the four `fact.rs` consumer loops
      and confirmed each treats every `ConditionalPointerPair`'s guard
      independently — no implicit AND with any enclosing conditional)
      promoted it to approved loss scenario. Fix introduces
      `DiscriminantGuard` and adds an `outer_guards: Vec<DiscriminantGuard>`
      field to `ConditionalPointerPair`; both
      `collect_conditional_pointers` and
      `collect_conditional_result_pointers` accept an `outer_guards`
      parameter that is the chain of enclosing-arm discriminants, append
      their own discriminant onto the chain when recursing into a payload,
      and stamp each emitted pair with the prefix chain; the four FACT
      adapter loops call two new helpers
      (`emit_conditional_guard_chain_flat` /
      `emit_conditional_guard_chain_byte` in `meld-core/src/adapter/fact.rs`)
      that emit each guard's `(load disc, I32Const value, I32Eq)` and
      `I32And` them all together before the existing `If` block fires the
      copy. The innermost guard remains in the existing
      `discriminant_*` fields for backward compatibility — `outer_guards`
      is empty for single-level conditionals so unchanged callers behave
      identically. Confirmed by PoC
      `meld-core::parser::tests::ls_p_10_nested_conditional_pointer_carries_outer_guard_chain`,
      which builds `result<option<string>, u32>` and asserts that on both
      the flat-param and retptr paths the pair guarding the string leaf
      carries the outer Result-Ok guard alongside the inner Option-Some
      guard.
    causal-factors:
      - >-
        `ConditionalPointerPair` carried a single (position, value, size)
        triple rather than a guard chain, so the parser had nowhere to
        encode "this copy is conditional on more than one discriminant"
      - >-
        Both `collect_conditional_pointers` and
        `collect_conditional_result_pointers` recursed into the payload
        of an outer option/result/variant by calling themselves with the
        payload's base, but did not thread the outer arm's discriminant
        into the recursion — so inner-emitted pairs guarded only on the
        inner arm
      - >-
        The four FACT adapter consumer loops processed each pair
        independently with a single `(load + I32Eq + If)` block; there
        was no separate mechanism that re-gated a nested pair on its
        enclosing conditional
      - >-
        No regression test exercised a nested-conditional pointer shape
        — every existing test had at most one level of option/result/
        variant
    process-model-flaw: >
      The code's model was "a `ConditionalPointerPair` is guarded by its
      one discriminant", but pointer-bearing nested conditionals demand a
      *conjunction* of discriminants: every enclosing arm must also hold,
      because reading the inner discriminant slot in a sibling outer arm
      reads unrelated payload bytes that the attacker controls.
    status: approved
    priority: high

  - id: LS-P-11
    title: Flat-name resolver overwrites duplicate module exports silently
    uca: UCA-R-3
    hazards: [H-5, H-1]
    type: inadequate-process-model
    scenario: >
      `meld-core/src/resolver.rs::resolve_via_flat_names` (called from
      `resolve_module_imports` when `component.instances.is_empty()`)
      builds an export index `HashMap<(&str, &str), (usize, &ModuleExport)>`
      keyed by the flat export name. The population loop iterates
      `component.core_modules` and calls `module_exports.insert(key, …)`
      with no entry check, no warning, no error. When two core modules
      within the same component both export the same flat name, the
      second module silently overwrites the first (last-writer wins);
      any subsequent import of that name resolves to the wrong module
      [UCA-R-3 misrouted import], the fused module is wired wrong but
      validates clean [H-5 dependency resolution produces wrong order /
      H-1 fused module traps at the wrong call site]. The wasm
      component validator does not catch it; the import/export shape
      type-checks. The instance-graph resolver
      (`resolve_via_instances`, taken whenever an `InstanceSection`
      exists) keys lookups through explicit instance edges and is
      immune. `wit-component` / `wasm-tools` always emit an
      `InstanceSection` for multi-module components, so this bug is
      latent and **practically unreachable** for well-formed
      production components — it is reachable for synthetic test
      fixtures and the legacy single-module fallback shape where the
      flat-name path is taken. Fix replaces the blind insert with an
      explicit collision check that returns a new
      `Error::DuplicateModuleExport { component_idx, export_name,
      first_module_idx, second_module_idx }` (mirroring the
      `DuplicateModuleInstantiation` pattern at `resolver.rs:2115`),
      converting silent misrouting into a loud error. Surfaced by the
      mythos-auto delta-pass on PR #179 and clean-room verified;
      promoted to approved loss scenario as defensive hardening rather
      than an emergency. Confirmed by PoC
      `meld-core::resolver::tests::ls_p_11_duplicate_flat_name_export_is_rejected`,
      which constructs two `CoreModule` entries both exporting `foo`
      and no `InstanceSection`, then asserts the resolver returns
      `Err(DuplicateModuleExport { .. })`.
    causal-factors:
      - >-
        `HashMap::insert` was used where the spec-correct semantics is
        "reject duplicate name within one component" — the duplicate
        check was simply missing on this code path
      - >-
        The sibling `DuplicateModuleInstantiation` error
        (`resolver.rs:2115`) already established the precedent for
        rejecting same-component duplicates, but the pattern was not
        replicated for export names
      - >-
        No regression test exercised the flat-name path with two
        modules emitting the same export — the path is rarely
        exercised because production multi-module components have an
        `InstanceSection`
    process-model-flaw: >
      The code's model was "module-export index is whatever the last
      module wrote", but the correct invariant is "within one component
      a flat export name resolves to at most one module" — same model
      as `DuplicateModuleInstantiation`, applied to exports rather than
      instantiations.
    status: approved
    priority: low

  - id: LS-P-12
    title: List of pointer-bearing option/result/variant — silent stale pointer corruption
    uca: UCA-P-3
    hazards: [H-4, H-4.2]
    type: inadequate-process-model
    scenario: >
      `meld-core/src/parser.rs::element_inner_pointers` walks the byte
      layout of a list-element type and returns each inner `(byte_offset,
      copy_layout)` pointer pair so the FACT adapter can do per-element
      fixup (allocate in callee memory, copy the pointed-to bytes, replace
      the source ptr with the callee's). The function handles `String`,
      `List`, `FixedSizeList`, `Record`, `Tuple`, and `Type`-aliased
      versions of those, plus a `_ => {}` catch-all (line 3203) that
      silently drops `Option`, `Result`, `Variant`, `Flags`, and `Enum`.
      As a consequence, `copy_layout(list<option<string>>)`,
      `copy_layout(list<result<string, _>>)`, and
      `copy_layout(list<variant { …(string)… }>)` all classified as
      `CopyLayout::Bulk { byte_multiplier: element_size }` — because
      `element_inner_pointers(option<string>, 0)` returns the empty
      vector even though `type_contains_pointers(option<string>)` is
      true. The FACT adapter's Bulk path (`adapter/fact.rs:1564-1575` /
      `2317-2331` / `2534-2549`) is a flat `memory.copy(dst, src,
      len * byte_multiplier)` with **no per-element walk** — so every
      copied option's `(ptr, len)` pair is written byte-for-byte into
      the callee's memory, with `ptr` still referencing the *source*
      component's linear memory. The callee then dereferences a wild
      pointer for each `Some(...)` element — a cross-memory
      dangling-reference / arbitrary read on every list use
      [UCA-P-3 / H-4 wrong adapter / H-4.2 missing pointer fixup].
      `ConditionalPointerPair` (LS-P-7, LS-P-10) does not rescue this:
      `collect_conditional_pointers` drops `List(_)` at its own
      `_ => {}` arm, and `collect_pointer_positions_with_layout` stops
      at `List(_)` and emits the pair with the (here Bulk) layout from
      `copy_layout`. Reachable for any non-empty `list<option<string>>`
      passed across a component boundary. Surfaced by the mythos-auto
      delta-pass on PR #179 and clean-room verified.
      **This commit is the conservative mitigation**, not the full fix.
      The proper fix needs (a) `Option`/`Result`/`Variant` arms on
      `element_inner_pointers` that recurse into the payload at the
      payload byte offset, AND (b) extending the
      `inner_pointers` descriptor on `CopyLayout::Elements` (currently
      `Vec<(u32, CopyLayout)>`) with per-element `DiscriminantGuard`
      chains, AND (c) updating the FACT per-element fixup loop in
      `fact.rs` to evaluate those guards before each inner copy. That
      is structurally analogous to LS-P-10 but on the list-element axis
      rather than the top-level conditional axis — material follow-up
      work tracked separately. Until then, `copy_layout` panics with a
      clearly-labelled `LS-P-12: …` message when it would otherwise
      have produced the corrupting `Bulk` classification, and the
      panic includes the offending element type in the diagnostic so
      WIT authors and tool integrators see why the adapter can't be
      generated. Confirmed by PoC
      `meld-core::parser::tests::ls_p_12_list_of_option_string_refuses_rather_than_silently_corrupts`
      (plus the `list<result<string, _>>` variant); a positive sanity
      test (`ls_p_12_pure_scalar_option_list_is_still_bulk`) pins the
      check is gated on `type_contains_pointers(inner)` so pure-scalar
      `list<option<u32>>` etc. remain `Bulk` as before.
    causal-factors:
      - >-
        `element_inner_pointers` was written when only Record/Tuple
        pointer-bearing list elements were considered; the
        Option/Result/Variant arms were never added and the
        `_ => {}` catch-all silently dropped them
      - >-
        `copy_layout(List(inner))` accepted the empty inner-pointer
        list from a pointer-bearing inner type and produced `Bulk`,
        the corrupting classification, with no consistency check
      - >-
        The adapter's per-element fixup machinery does not yet
        support per-element discriminant guards — required for
        conditional inner pointer fixup
      - >-
        No regression test exercised `list<option<string>>` or any
        nested-conditional list element
    process-model-flaw: >
      The shared model between `element_inner_pointers` and
      `copy_layout` was "if the inner-pointer set is empty, the element
      has no pointers and a flat byte copy is correct" — but emptiness
      came from the missing arms, not from absence-of-pointers. The
      `type_contains_pointers(inner)` predicate already encoded the
      right invariant; it just wasn't checked alongside the emptiness
      decision.
    status: approved
    priority: high

  - id: LS-P-13
    title: Async adapter param-copy treats every (i32, i32) pair as a pointer pair
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/adapter/fact.rs::emit_param_copy_step` (called from
      `generate_async_callback_adapter` and `generate_async_stackful_adapter`
      — the P3-async lift paths) determines which of the caller's flat
      param slots are `(ptr, len)` pointer pairs that need a
      cross-memory `cabi_realloc` + `memory.copy` fixup. Instead of
      using the resolver's `site.requirements.pointer_pair_positions`
      slice directly (which is already the list of *flat* indices,
      computed by `parser.rs::pointer_pair_param_positions` walking the
      function's params with `flat_count`), the code walked
      `caller_type.params` looking for consecutive `(i32, i32)` slots
      and gated each match on
      `pointer_pair_positions.iter().any(|_| true)` — semantically
      `!is_empty()`. Every adjacent integer-pair argument was therefore
      treated as a pointer pair whenever the function had **any**
      string/list param. For a signature like
      `fn f(a: i32, s: string, b: i32, c: i32)` lowered to flat params
      `[I32, I32, I32, I32, I32]` with the resolver's positions
      `[1]`, the buggy code emitted `positions = [0, 2]`: it then ran
      `cabi_realloc(0, 0, 1, ptr_s_value)` (treating the string's
      *pointer* as a length, attacker-influenced byte count), copied
      from caller-memory address `a` (treating the integer arg as a
      source pointer), and replaced `a` with the freshly allocated
      buffer — corrupting plain integer args and reading from
      attacker-controlled caller-memory addresses [UCA-P-3 / H-2
      caller-controlled offsets / H-4.1 wrong byte length]. The real
      string at flat index 1 was never copied. Reachable for any
      mixed-signature async-lift fusion that crosses memories. Pure
      single-string signatures like `fn f(s: string)` flattened to
      `[I32, I32]` happen to behave correctly by accident — the only
      pair the code considers is `(0, 1)`, which is the string. Same
      shape with extra args is corrupting. Surfaced by the mythos-auto
      delta-pass on PR #179 and clean-room verified. Fix replaces the
      heuristic walk + emptiness check with
      `site.requirements.pointer_pair_positions.clone()`: the resolver
      already produces the correct flat indices and canonical lowering
      preserves param order between caller and callee component types,
      so the comment block claiming the positions are "in callee
      component type order" while locals are "in caller order" was
      misleading — flat indices computed from canonical lowering apply
      equally to both sides. Confirmed by PoC
      `meld-core::parser::tests::ls_p_13_pointer_pair_param_positions_is_flat_indices_not_just_nonempty`,
      which pins the resolver contract on `(a: u32, s: string, b: u32,
      c: u32)` returning `[1]` and on `(a, s1, b, s2, c)` returning
      `[1, 4]` — the invariants the async adapter now consumes
      directly.
    causal-factors:
      - >-
        `.any(|_| true)` was a stand-in placeholder pattern that should
        have been `.any(|&pos| pos == i as u32)` (and that, in turn,
        should have been the cleaner direct use of the resolver's
        positions); the placeholder was never replaced and the
        predicate name made it look intentional
      - >-
        The comment block at the top of `emit_param_copy_step`
        claimed the resolver's positions were "in callee component
        type order" — implying a caller/callee mismatch the function
        needed to work around — but
        `pointer_pair_param_positions` returns *flat* indices
        computed from the canonical-lowered param list, which
        canonical lowering preserves identically between caller and
        callee component-type matched signatures
      - >-
        No regression test exercised `emit_param_copy_step` with a
        mixed-signature async export crossing memories; the
        `tests/p3_async_lowering.rs` coverage focuses on trampoline
        shape and event codes, not parameter copy correctness
    process-model-flaw: >
      The mental model was "verify there's *something* to copy before
      walking the flat params," which collapsed the per-position
      identity check into an emptiness check. The right invariant
      ("this specific flat slot is a pointer pair") was encoded in
      the resolver's positions all along — the adapter just discarded
      them.
    status: approved
    priority: high

  - id: LS-P-14
    title: Nested-list inner copy `buf_len = len * sub_elem_size` lacks overflow guard
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/adapter/fact.rs::emit_patch_nested_indirections`
      walks each element of a list-of-records (or list-of-tuples) at
      adapter-generation time and emits, for each inner pointer
      indirection inside the element, a `cabi_realloc` + `memory.copy`
      sequence that copies the inner list/string from callee memory into
      the caller's. The byte count for that copy is computed at runtime:
      load `len` from the callee's memory at byte offset `+4` from the
      element record, then multiply by `sub_elem_size` (the inner list's
      element stride) via a bare `i32.mul`. `i32.mul` is modulo 2³², so
      a callee-supplied `len` near `u32::MAX / sub_elem_size` wraps the
      product to a small value. The subsequent bounds check
      (`old_ptr + buf_len > mem_bytes`) uses `i32.add`, which **also**
      wraps and is bypassed. The adapter then allocates and copies only
      the wrapped byte count, while the caller-side bulk copy of the
      outer element bytes keeps the original large `len` field — so the
      callee receives a `(new_ptr, full_len)` pair whose buffer is far
      smaller than `full_len` bytes [UCA-P-3 / H-2 caller-controlled
      offsets / H-4 / H-4.1 wrong byte length]. Reads/writes into the
      buffer past `wrapped_buf_len` walk into adjacent caller-allocated
      memory — silent truncation in the inner list contents and OOB
      access on every dereference past the truncated edge. Reachable for
      any cross-memory fusion of a function whose param/result contains
      a `list<record { …; inner: list<T> }>` (or tuple analogue) where
      the callee can produce a length within one `sub_elem_size` of
      `u32::MAX / sub_elem_size`. Surfaced by the mythos-auto delta-pass
      on PR #179. Fix: stash the loaded `len` into the existing
      `l_buf_len` scratch local, call
      `emit_overflow_guard(body, l_buf_len, sub_elem_size as u32)`
      (which traps via `unreachable` when the multiplication would wrap),
      then re-fetch the local for the multiplication. `emit_overflow_guard`
      with `k == 1` is a no-op so the guard is harmless when
      `sub_elem_size == 1`. Confirmed by PoC
      `meld-core::adapter::fact::tests::ls_p_14_nested_list_inner_copy_emits_overflow_guard`,
      which emits a synthetic patch-loop for `record { items: list<u32> }`
      (`sub_elem_size = 4`) and asserts the encoded function body
      contains an `Unreachable` opcode — the only place that opcode
      appears along this path is inside `emit_overflow_guard`.
    causal-factors:
      - >-
        `emit_patch_nested_indirections` was written before the
        `emit_overflow_guard` helper landed (the helper was added as
        the LS-A-7 leg (a) fix for the outer-list copy paths), and the
        retrofit never reached the inner copy
      - >-
        The bounds check below the multiplication uses the same
        wrapping `i32.add` arithmetic, so the comment "skip patch if
        (old_ptr, buf_len) doesn't fit in callee mem" overstated the
        protection — a wrapped `buf_len` slips the check
      - >-
        No regression test exercised
        `emit_patch_nested_indirections` for an element type with
        non-trivial `sub_elem_size`
    process-model-flaw: >
      The model was "the outer copy paths guard against overflow; the
      inner per-element copies do not need to," but the inner copies
      consume callee-controlled `len` values just like the outer ones —
      the trust boundary is the same.
    status: approved
    priority: high

  - id: LS-P-15
    title: Out-of-bounds resource_type_id silently misclassified as callee-defined
    uca: UCA-R-3
    hazards: [H-5, H-1]
    type: inadequate-process-model
    scenario: >
      `meld-core/src/resolver.rs::resolve_resource_positions` decides
      whether the callee component owns a resource's representation
      (and therefore the adapter must emit `[resource-rep]`) or merely
      imports it (`[resource-new]`). The decision routes through a
      lookup into `component.component_type_defs` keyed by
      `pos.resource_type_id as usize`:
      `.get(...).map(|def| !matches!(def, ComponentTypeDef::Import(_))).unwrap_or(true)`.
      When `resource_type_id` exceeds `component_type_defs.len()` — a
      stale id surviving alias propagation, a parser-produced id past
      the local table, a malformed input — `.get(...)` returns `None`
      and `unwrap_or(true)` silently classifies the resource as
      *callee-defined* with no warning. The adapter then emits a
      `[resource-rep]` call where `[resource-new]` was correct (or
      vice versa) — a silent swap of the two resource-handle
      conversion sides on every fused cross-component call passing that
      handle [UCA-R-3 import wired to wrong source / H-5 dependency
      resolution produces wrong order / H-1 fused module traps at the
      wrong call site when the handle is dereferenced]. The handle
      type-checks on both sides (both are i32-shaped) so the validator
      does not catch it. Reachability is bounded: the normal
      instance-graph path keys `resource_type_id` through validated
      type indices that the parser produced from canonical entries, so
      this is reachable mainly on stale ids, malformed input, or after
      alias remaps that outrun the local type table — defensive
      hardening rather than a memory-safety emergency. Surfaced by the
      mythos-auto delta-pass on PR #179. Fix replaces the
      `.unwrap_or(true)` with an explicit `match`: on `Some(def)`,
      classify by type; on `None`, emit a `log::warn!` and `continue`,
      so the position is *dropped* rather than silently misclassified.
      The downstream adapter will either find no work to do for the
      unused flat slot, or surface a loud missing-fixup error at
      adapter generation — never silently swap conversion sides.
      Confirmed by PoC
      `meld-core::resolver::tests::ls_p_15_out_of_bounds_resource_type_id_is_dropped_not_misclassified`,
      which builds a synthetic `ResourceImportMap` whose lookup
      succeeds at `resource_type_id = 999`, then calls
      `resolve_resource_positions` against an `empty_parsed_component`
      (zero entries in `component_type_defs`) and asserts the returned
      `Vec<ResolvedResourceOp>` is empty (pre-fix: one mis-classified
      entry; post-fix: dropped with a warn log).
    causal-factors:
      - >-
        `unwrap_or(true)` was a stand-in defensive default that should
        have been "fall through to the import path" or "fail loud" —
        `true` is the more dangerous default because it triggers the
        adapter to emit a `[resource-rep]` call against a resource
        whose representation the callee does not own
      - >-
        The lookup miss had no warning channel, so a stale/malformed
        `resource_type_id` produced an adapter with quietly wrong
        resource-handle conversions and no diagnostic for the
        toolchain to surface
      - >-
        No regression test exercised `resolve_resource_positions` with
        a `resource_type_id` outside the local `component_type_defs`
        range
    process-model-flaw: >
      The model was "any failure to classify is benign," but the
      adapter's `[resource-rep]` vs `[resource-new]` choice is
      asymmetric — emitting the wrong call produces a handle whose
      conversion side mismatches the callee's expectation, an error
      that compiles cleanly and only surfaces when the handle is
      dereferenced at runtime.
    status: approved
    priority: low

  - id: LS-P-16
    title: UTF-16→UTF-8 transcoding reads OOB on lone high surrogate at end of input
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.4]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/adapter/fact.rs::emit_utf16_to_utf8_transcode`
      emits the per-code-unit transcoding loop the FACT adapter uses
      when the caller component declares `string-encoding=utf16` and
      the callee declares `utf8` (the `(caller=Utf16, callee=Utf8)`
      case dispatched at fact.rs:2999–3001, gated on
      `crosses_memory && needs_transcoding`). The loop's only bounds
      check is `src_idx >= input_len` (lines 3460–3463) against the
      *first* code unit of each iteration. When that code unit is in
      `[0xD800, 0xDC00)` (high surrogate), the surrogate-pair `If`
      arm unconditionally emits a second `I32Load16U` at
      `mem16[ptr + (src_idx + 1) * 2]`. For an input whose **last**
      code unit is a lone high surrogate, that load reads 2 bytes
      past the end of the caller-supplied UTF-16 buffer — into
      attacker-adjacent caller linear memory. The two bytes are
      treated as the "low surrogate" without validating
      `0xDC00 <= cu2 < 0xE000`, producing a `cp = 0x10000 +
      ((cu - 0xD800) << 10) + (cu2_oob - 0xDC00)` whose value is
      typically in the 4-byte UTF-8 range. The 4-byte encoder
      then writes 4 bytes derived from the OOB read into callee
      linear memory — silent cross-memory leak of attacker-adjacent
      caller bytes into the callee's UTF-8 output [UCA-P-3 /
      H-2 caller-controlled offsets / H-4.4 incorrect string
      transcoding]. `src_idx += 2` then advances past `input_len`,
      so the outer `src_idx >= input_len` check breaks the loop
      cleanly the next iteration — no trap, silent corruption.
      Reachable for any cross-memory UTF-16→UTF-8 string transfer
      whose last UTF-16 code unit is a lone high surrogate.
      Surfaced by the mythos-auto delta-pass on PR #179 and
      clean-room verified. This commit is the conservative
      mitigation: inject a `src_idx + 1 >= input_len` check inside
      the surrogate-pair `If` arm and `unreachable`-trap on failure.
      The Canonical-ABI-correct behaviour is to replace the lone
      surrogate with U+FFFD (3-byte UTF-8 `EF BF BD`) and continue
      — that upgrade is tracked as a separate structural follow-up.
      Trap converts silent cross-memory leak into a loud
      adapter-runtime trap. Confirmed by PoC
      `meld-core::adapter::fact::tests::ls_p_16_utf16_lone_high_surrogate_oob_guard_emitted`,
      a structural regression that pins the LS-P-16 marker comment
      AND requires an `Unreachable` + `I32GeU` opcode pair to live
      inside the surrogate-pair `If` arm before the second
      `I32Load16U`.
    causal-factors:
      - >-
        `emit_utf16_to_utf8_transcode`'s only bounds check guarded
        the first code unit per iteration; the surrogate-pair arm
        unconditionally followed up with a second load
      - >-
        No bounds check between the high-surrogate detection and the
        low-surrogate load, despite UTF-16 trivially admitting a
        lone high surrogate at the end of a string
      - >-
        No validation that the second code unit is actually a low
        surrogate (`0xDC00 <= cu2 < 0xE000`) — without it, an OOB
        read whose value happens to fall outside the low-surrogate
        range still proceeds into the 4-byte encoder
      - >-
        No regression test for UTF-16 inputs ending on a high
        surrogate; the test module's TODO list (line 5067) had this
        explicitly listed as not-yet-covered
    process-model-flaw: >
      The model was "high-surrogate detection implies a valid
      surrogate pair," but UTF-16 strings legitimately end on a lone
      high surrogate (e.g., malformed input from JS, broken
      truncation). The Canonical ABI mandates lossy replacement, not
      OOB read.
    status: approved
    priority: high

  - id: LS-P-18
    title: LS-P-12 bypassed when a record mixes a covered pointer with a hidden conditional one
    uca: UCA-P-3
    hazards: [H-4, H-4.2]
    type: inadequate-process-model
    scenario: >
      The LS-P-12 mitigation in `copy_layout(List(inner))` fires only when
      `element_inner_pointers(inner, 0)` is empty AND
      `type_contains_pointers(inner)` is true. For a record/tuple that
      mixes a *covered* pointer field (bare `string` or `list`) with a
      *hidden* conditional pointer field (an `option/result/variant` whose
      payload contains a pointer), `element_inner_pointers` returns a
      non-empty Vec from the covered field — the LS-P-12 panic does not
      fire and `copy_layout` returns
      `CopyLayout::Elements { inner_pointers: [<covered field only>] }`.
      The FACT adapter walks `inner_pointers`, fixes up the covered field,
      and never touches the option-payload pointer. After the cross-memory
      copy the callee receives an element whose option payload still
      contains a string `(ptr, len)` pair referencing the *source*
      component's memory — silent cross-memory dangling reference per
      `Some(_)` element on every fused list copy [UCA-P-3 / H-4 / H-4.2].
      Reachable for any `list<record { …; option<string> }>` (and the
      tuple / nested / type-aliased analogues). Surfaced by the
      mythos-auto delta-pass on PR #179 as a refinement attack on
      LS-P-12; clean-room verified by tracing the `inner_ptrs` /
      `inner_res` non-emptiness short-circuit. Fix replaces the
      emptiness-based guard with a deep recursive
      `has_pointer_bearing_conditional(inner)` check (new helper) that
      visits Option / Result / Variant arms reachable through Records,
      Tuples, FixedSizeLists, and `Type` aliases. If any pointer-bearing
      conditional exists anywhere within the element layout,
      `copy_layout(List(inner))` panics with the LS-P-18 marker — the
      adapter refuses to generate rather than emit a `CopyLayout::Elements`
      whose `inner_pointers` would omit a per-element conditional
      fixup. Confirmed by PoC
      `meld-core::parser::tests::ls_p_18_mixed_record_with_option_string_bypasses_p12_then_refuses`
      which builds `list<record { items: list<u8>, maybe: option<string> }>`
      and asserts the panic. A positive sanity test,
      `ls_p_18_pure_bare_pointer_record_still_works`, pins that the
      strengthened guard does not over-refuse pure-bare-pointer records
      (e.g. `record { name: string, value: u32 }`).
    causal-factors:
      - >-
        The original LS-P-12 guard's emptiness criterion was a proxy for
        "no pointers covered yet" — a positive presence of any covered
        pointer (bare `string`/`list`) short-circuited the proxy even
        when other pointer positions were silently missing
      - >-
        No regression test exercised a record that mixed a covered
        pointer field with a hidden conditional pointer field — the
        bypass had no fixture
    process-model-flaw: >
      The shared model was "empty `inner_pointers` is the only failure
      mode," but the missing-arms behaviour of `element_inner_pointers`
      produces a partial output (some pointer positions, missing
      others) that the emptiness check accepts as complete.
    status: approved
    priority: high

  - id: LS-P-19
    title: UTF-8→UTF-16 transcoder reads OOB for truncated multi-byte UTF-8
    uca: UCA-P-3
    hazards: [H-2, H-4, H-4.4]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/adapter/fact.rs::emit_utf8_to_utf16_transcode` emits
      the per-byte UTF-8→UTF-16 transcoding loop the FACT adapter uses
      when the caller declares `string-encoding=utf8` and the callee
      declares `utf16` (the canonical mirror of LS-P-16). The outer
      loop guards the lead byte with `src_idx >= input_len`. Each
      multi-byte branch (2-byte: `byte < 0xE0`; 3-byte: `byte < 0xF0`;
      4-byte: `byte >= 0xF0`) then unconditionally reads its
      continuation bytes via `I32Load8U` at offsets `src_idx + 1`,
      `+2`, `+3`. A UTF-8 string ending on a truncated multi-byte lead
      byte (e.g. `0xE2` with no following bytes; `0xF0` with only one
      following byte; etc.) causes the adapter to read 1–3 bytes of
      attacker-adjacent caller linear memory past the buffer end,
      incorporate them into a synthesized code point via the canonical
      shift/mask formula, and emit the resulting code point as UTF-16
      into the callee output — silent cross-memory leak of caller
      bytes per transcoded string [UCA-P-3 / H-2 caller-controlled
      offsets / H-4.4 incorrect string transcoding]. The composed
      (non-fused) execution traps on invalid UTF-8 with a `len`/byte
      mismatch; the fused execution silently corrupted, producing
      semantic drift. Reachable for any cross-memory
      UTF-8-caller/UTF-16-callee fusion whose UTF-8 string ends on a
      truncated multi-byte lead. Surfaced by the mythos-auto
      delta-pass on PR #179. Conservative mitigation prepends a
      `src_idx + N >= input_len` `unreachable` trap to each multi-byte
      branch (N = 1 for the 2-byte case, 2 for 3-byte, 3 for 4-byte).
      The Canonical-ABI-correct upgrade replaces truncated sequences
      with the U+FFFD replacement character (tracked alongside the
      LS-P-16 upgrade). Trap converts silent leak into loud
      adapter-runtime trap. Confirmed by PoC
      `meld-core::adapter::fact::tests::ls_p_19_utf8_to_utf16_continuation_byte_oob_guard_emitted`,
      a structural test pinning the LS-P-19 marker at all three
      multi-byte branches and the cumulative Unreachable + I32GeU
      opcode count across LS-P-16 and LS-P-19.
    causal-factors:
      - >-
        The outer-loop bounds check guarded only the lead byte; the
        continuation-byte reads inside each multi-byte branch had no
        independent guard
      - >-
        The canonical UTF-8 decoder pattern assumes valid UTF-8 input
        (continuation bytes always present); fused adapters consume
        untrusted caller buffers where truncation is reachable
      - >-
        No regression test covered the truncated-lead-byte edge case
        for any of the three multi-byte branches
    process-model-flaw: >
      The model was "if the lead byte is in-range, the implied
      continuation bytes must also be in-range," but the lead byte's
      classification does not constrain the buffer end — a truncated
      multi-byte sequence is the obvious counterexample.
    status: approved
    priority: high

  - id: LS-P-17
    title: Caller-encoding match filters on Func only, miscalibrates mixed-encoding callers
    uca: UCA-R-3
    hazards: [H-4, H-4.4]
    type: inadequate-process-model
    scenario: >
      `meld-core/src/resolver.rs` has two structurally-identical
      caller-encoding lookup loops (primary site around lines 2877–
      2910, fallback site around 3175–3225). Each iterates
      `from_component.imports` filtering on
      `wasmparser::ComponentTypeRef::Func(_)` and tries to match
      `ci.name == *import_name` to find the caller's `Lower` options
      for the resolved interface. WIT interface imports lower to
      `ComponentTypeRef::Instance(_)` at the component-import level,
      so the loop **never matches for interface imports** — the only
      shape that can match is a top-level bare-`Func` component
      import, which `wit-component` / `wasm-tools` does not emit
      under the WIT-bindgen norm. The loops fall through to a
      heuristic `caller_lower_map.iter().min_by_key(|(k, _)| **k)`
      that picks the encoding of the **lowest-indexed Lower** entry,
      then assigns it as `requirements.caller_encoding` for whatever
      interface is currently being resolved. `string_transcoding` is
      then computed as `caller_encoding != callee_encoding` against
      the single heuristic-selected encoding. For single-encoding
      callers (the overwhelming majority of WIT-bindgen output
      today — UTF-8 throughout) the heuristic happens to pick the
      only encoding present and `string_transcoding` is correctly
      attributed. For mixed-encoding callers (UTF-16 for one
      interface, UTF-8 for another — e.g. a JS/.NET host component
      lowering UTF-16 to one import alongside a Rust UTF-8 lowering
      to another, both calling a UTF-8 callee) the heuristic picks
      one encoding for **every** interface, so the adapter skips
      transcoding where it was needed (or forces it where it was
      unnecessary). The emitted lift/lower bridge then either reads
      raw UTF-16 bytes as UTF-8 or vice versa, producing scrambled
      strings at the call boundary [UCA-R-3 wrong adapter wiring /
      H-4 / H-4.4 incorrect string transcoding]. Reachability:
      latent today since most components are single-encoding, but
      legal under the Component Model and exposed whenever multi-
      encoding host components arrive. Surfaced by the mythos-auto
      delta-pass on PR #179 and clean-room verified. **This commit
      is the conservative mitigation**: detect mixed-encoding
      callers (`caller_lower_map.values()` not all identical) before
      the heuristic fallback fires and emit a `log::warn!` with the
      LS-P-17 marker and the interface name, so the miscompile is
      no longer silent. The full structural fix — resolve the
      caller's component func index from the core import via a
      `caller_core_import_to_comp_func` map (or extend the loop to
      walk `ComponentTypeRef::Instance` aliases) to get per-function
      precision — is tracked as follow-up. Confirmed by PoC
      `meld-core::resolver::tests::ls_p_17_mixed_caller_encoding_warns_before_heuristic_fallback`,
      a structural test that requires the LS-P-17 marker comment to
      live at **both** sites and that the warn-on-mixed pattern
      (`all_same` uniformity check + `log::warn!`) is present.
    causal-factors:
      - >-
        The component-import filter was hardcoded to
        `ComponentTypeRef::Func`, but the canonical encoding of WIT
        interface imports is `ComponentTypeRef::Instance` — the
        filter excludes the very shape it was meant to match
      - >-
        The heuristic fallback (`min_by_key` over the entire
        `caller_lower_map`) cannot recover per-interface attribution
        from a global lowest-index choice
      - >-
        The fallback emitted only a `log::debug!`, so the
        misattribution was invisible at default logging level
      - >-
        No regression test exercised
        `resolve_component_imports_with_hints` with a
        mixed-encoding caller (UTF-16 for one interface, UTF-8 for
        another)
    process-model-flaw: >
      The model was "the per-interface caller encoding is a function
      of the lowered-options table alone," but it is actually a
      function of the (interface, func) pair — multi-encoding
      callers need per-interface lookup. The global heuristic
      collapses that pairing onto a single global default.
    status: approved
    priority: low

  # ==========================================================================
  # Resolver scenarios
  # ==========================================================================

  - id: LS-R-1
    title: Import matched to wrong export due to name normalization
    uca: UCA-R-3
    hazards: [H-1]
    type: inadequate-control-algorithm
    scenario: >
      Component A imports "wasi:http/handler@0.2.0" and two components
      (B and C) both export interfaces matching that name. The resolver
      selects the first match found during iteration, which may be
      component C instead of the intended component B. The caller invokes
      the wrong implementation [UCA-R-3], producing different behavior
      [H-1].
    causal-factors:
      - Resolver uses first-match strategy without disambiguation
      - No error on ambiguous matches

  - id: LS-R-2
    title: CopyLayout misclassifies pointer-containing record as Bulk
    uca: UCA-R-5
    hazards: [H-4, H-4.2]
    type: inadequate-process-model
    scenario: >
      A function parameter is list<record { name: string, value: u32 }>.
      The resolver's type analysis inspects only the outer list type and
      determines it can use Bulk copy (byte_multiplier). It does not
      recurse into the record's fields to discover the string field
      (pointer pair). The adapter performs a bulk memory.copy [UCA-R-5]
      without inner pointer fixup [H-4.2]. The callee dereferences
      string pointers that reference the source memory and reads garbage.
    causal-factors:
      - CopyLayout construction does not recurse into record fields
      - Missing test case for records with pointer fields inside lists
    process-model-flaw: >
      Resolver believes the type is a flat byte buffer because it only
      examined the outermost type structure.

  - id: LS-R-3
    title: Topological sort produces wrong order with diamond dependencies
    uca: UCA-R-6
    hazards: [H-5, H-1]
    type: inadequate-control-algorithm
    scenario: >
      Four components form a diamond dependency: A depends on B and C,
      both B and C depend on D. The topological sort visits B before D
      because the adjacency list iteration order places B first. Component
      B is instantiated before D [UCA-R-6], and B's imports from D bind
      to absent exports [H-5], causing the fused module to trap [H-1].
    causal-factors:
      - Topological sort does not enforce total ordering among peers
      - Adjacency list iteration depends on insertion order

  - id: LS-R-4
    title: Cycle detection fails on self-importing component
    uca: UCA-R-7
    hazards: [H-5, H-1]
    type: inadequate-control-algorithm
    scenario: >
      A component imports an interface that it also exports (self-cycle).
      The cycle detection logic checks for cycles of length >= 2 but not
      self-loops. The resolver produces an order without error [UCA-R-7],
      and the component's import binds to its own export before
      initialization completes [H-5].
    causal-factors:
      - Cycle detection skips self-edges in the dependency graph
      - No test for self-importing components

  - id: LS-R-10
    title: Intra-component adapter promotion drops from_import_module disambiguator
    uca: UCA-R-3
    hazards: [H-1, H-3.1]
    type: inadequate-control-algorithm
    scenario: >
      `ModuleResolution` carries `from_import_module` (the wasm core
      import's `module` string) precisely so the resolver and merger can
      disambiguate when a single core module imports two functions with
      the same `name` from different `module`s (e.g. `env.alloc` vs
      `mylib.alloc`, or `wasi:clocks/wall-clock@0.2.0::now` vs
      `wasi:clocks/monotonic-clock@0.2.0::now`). When intra-component
      adapter promotion fired in
      `meld-core/src/resolver.rs::identify_intra_component_adapter_sites`
      (~line 3037 pre-fix), the new `AdapterSite.import_module` was set
      to `res.import_name` (the field name) rather than
      `res.from_import_module` (the module string). The downstream
      first-match in `merger.rs:1500`
      `(imp.module == site.import_module || imp.name == site.import_module)`
      then accepted EITHER core import for EITHER promoted adapter site,
      collapsing the two distinct calls onto whichever site sat first in
      `adapter_sites`. The fused module called the wrong upstream export
      [UCA-R-3], either trapping on a signature mismatch [H-1] or — when
      signatures happened to align — silently producing wrong values
      [H-3.1]. Detected by the unit test
      meld-core::resolver::tests::test_issue112_item5_intra_adapter_preserves_from_import_module
      (asserts the promoted site's `import_module` equals
      `from_import_module`, not `import_name`) and Kani harness
      `check_item5_promotion_preserves_from_import_module`. Fix lands in
      commit on branch fix/issue-112-mythos-v04-followup: use
      `res.from_import_module` when non-empty, fall back to
      `res.import_name` only for legacy synthesised resolutions where
      the field is empty.
    causal-factors:
      - >-
        Intra-component adapter promotion path discarded the
        `from_import_module` disambiguator already present on
        `ModuleResolution`
      - >-
        `merger.rs:1500`'s disjunctive match accepts either field-name
        OR module-name as the disambiguator, so the wrong value silently
        succeeds rather than failing fast
      - >-
        No regression test asserted the `import_module` field for
        promoted intra-component adapter sites
    status: approved
    priority: high

  - id: LS-R-11
    title: Cross-component stream pair wired with mismatched element types
    uca: UCA-R-5
    hazards: [H-1, H-3.1]
    type: inadequate-process-model
    scenario: >
      Component A's export declares `stream<u8>` and component B's import
      declares `stream<s32>`. The component-model linker accepts the name
      match (resolved import edge exists), but
      `meld-core/src/p3_stream.rs::pair_streams` silently drops the
      candidate at line 229 (`if p_elem != c_elem { continue; }`) because
      the honest-candidate rule rejects mismatched element types. The
      cross-component adapter that would otherwise short-circuit the
      stream chain is never emitted, and the fused module falls back to
      the host-routed lowering with each side reinterpreting the wire
      bytes as its own element type. Numeric values are truncated /
      sign-extended at the wrong width [H-3.1]; for variable-width
      element types this can produce out-of-bounds reads on the consumer
      side [H-1]. The hazard surfaces only at runtime when the stream is
      first written, and on test fixtures small enough to "happen to
      look right" can stay latent indefinitely.
    causal-factors:
      - >-
        `pair_streams` is a pure-candidate-emission function; rejection
        and reporting are different concerns, so the silent drop has no
        diagnostic path back to the user
      - >-
        Component-model name-match resolution accepts the wiring at
        link time because stream element types are encoded as
        `ComponentTypeKind::P3Async(desc)` strings, and the resolver
        does not yet compare descriptor equality
      - >-
        No build-time validation pass ever asked "is every connected
        component pair with complementary stream roles actually paired
        by the candidate emitter?"
    process-model-flaw: >
      The detection model was "if we don't generate a pair, the program
      stays in the existing host-routed code path and runs correctly."
      That model breaks when the host-routed path itself is built from
      type-erased import names: the same byte stream reaches the
      consumer with a different on-wire interpretation than the
      producer intended.
    status: approved
    priority: high
    fix: >
      Two-stage fix across PR #188 and a follow-up PR. PR #188 first
      shipped a role-list heuristic, which the Mythos delta-pass
      auto-scan correctly identified as having a false-positive path
      (sync-only connection + unrelated streams). The heuristic was
      withdrawn from #188; the follow-up PR replaced it with a
      stream-typed-import filter: for each fusion connection, walk
      `resolved_imports` and check whether any edge's importer
      declares a `stream<T>` somewhere in its `ComponentTypeRef`
      signature (Func params/results, Type aliases, Instance exports
      — recursing through `ComponentValType::List`, `Option`,
      `Result`, `Record`, `Variant`, `Tuple`, `FixedSizeList`). The
      role-list pair check now fires only on filtered connections.
      Confirmed by `meld-core::p3_stream::tests::ls_r_11_stream_typed_import_with_mismatched_roles_raises`
      (true positive) and `ls_r_11_sync_only_connection_with_unrelated_streams_does_not_raise`
      (Mythos-finding regression — the exact false positive the
      original heuristic produced). Two type-walker unit tests
      (`stream_elements_in_typeref_walks_func_param`,
      `stream_elements_in_typeref_returns_empty_for_sync_func`) pin
      the walker independently. **Precision boundary**: the filter
      knows a connection carries SOME stream, but the mismatch
      decision still uses the role-list multiset — it cannot tie a
      specific import to a specific stream-handle pair without full
      export-side type-graph walks via `component_func_defs`. A
      `stream<T>` hidden inside an aliased composite type accessed
      via `ComponentValType::Type(idx)` is also not chased. Both
      boundaries are documented in `p3_stream.rs`'s module comment;
      future refinements remain backlogged but are not required to
      close this entry.

  - id: LS-R-13
    title: Recursive Tarjan in stream-cycle detector exhausts call stack
    uca: UCA-R-5
    hazards: [H-9]
    type: inadequate-process-model
    scenario: >
      `strongly_connected_components` in `meld-core/src/p3_stream.rs`
      walks the directed producer→consumer graph using a Tarjan SCC
      implementation. The first draft of this code recursed once per
      node via an inner `strongconnect` function; a linear chain of N
      stream-coupled components (the common pipeline dataflow) becomes
      a depth-N call sequence. At roughly N ≈ 40 000 — a function of
      the ~200-byte stack-frame size against the default 8 MB Rust
      thread stack — the recursion overflows and the meld process
      aborts (`fatal runtime error: stack overflow`) before validation
      completes [H-9]. Switching the backing implementation to
      `petgraph::algo::tarjan_scc` did NOT fix this — petgraph 0.8's
      tarjan_scc is also recursive (confirmed by a 50 000-node
      regression test still overflowing). Meld's practical fusion
      input is bounded by component count and the hazard is not
      reachable from normal WIT compositions, but a maliciously
      crafted component graph (or a future scaled-up use case) could
      hit it.
    causal-factors:
      - >-
        The first draft of `strongconnect` was a straight transliteration
        of the canonical recursive Tarjan from the algorithm paper,
        without consideration of the Rust thread-stack bound
      - >-
        Assuming a library implementation (e.g. `petgraph::algo::tarjan_scc`)
        is automatically iterative because it's "library code" — both
        common SCC libraries in the Rust ecosystem ship recursive
        implementations at the time of writing
      - >-
        No regression test exercised a graph deep enough to hit the
        recursion depth limit
    process-model-flaw: >
      The detection model implicitly assumed practical inputs sit
      well below the stack-depth bound. That holds for meld's actual
      WIT component counts but isn't a property of the validator
      itself — any code accepting an unbounded graph from external
      input is responsible for not blowing the stack on it.
    status: approved
    priority: medium
    fix: >
      Replaced the recursive `strongconnect` with an iterative Tarjan
      that holds (node, next-successor-index) frames on an explicit
      work-stack. Identified by the Mythos delta-pass auto-scan on
      PR #188, confirmed by
      `meld-core::p3_stream::tests::deep_linear_chain_does_not_overflow_stack`
      (50 000-node linear chain — comfortably past the recursive
      threshold).

  - id: LS-R-12
    title: Multi-component stream cycle deadlocks at runtime
    uca: UCA-R-5
    hazards: [H-9, H-1]
    type: inadequate-process-model
    scenario: >
      Three or more components wire `stream<T>` endpoints in a closed
      cycle: A → B → C → A (each component is both producer for the
      next and consumer for the previous). The fused module instantiates
      all three streams, but every component blocks waiting on inbound
      data before producing outbound — and the only path to inbound
      data is through the cycle. No component ever progresses [H-9];
      depending on runtime, this manifests as a hang, a fairness
      deadlock, or eventually a watchdog trap [H-1]. The 2-component
      "bidirectional pipe" pattern (A↔B with two independent streams)
      is the legal version of this shape: each stream individually has
      one producer and one consumer, and at least one side can
      progress independently. The hazard only appears at SCC size ≥ 3,
      where every component is mutually dependent.
    causal-factors:
      - >-
        `StreamPairGraph` stored only the set of detected pairs with
        no traversal of the induced directed component graph, so cycle
        detection on streams was never run (the resolver's
        module-level `detect_module_cycles` operates on a different
        graph and does not see stream edges)
      - >-
        The bidirectional pipe pattern is a 2-cycle on the same
        component graph, so a naive "any cycle is bad" detector would
        false-positive on the canonical pipe shape and force the
        detector to be either over-tight (rejects legal pipes) or
        absent
      - >-
        Stream deadlocks surface only when actual data flows, which
        may be hours or days into a long-running fused module
    process-model-flaw: >
      The model assumed cross-component stream pairs were independent
      edges in a bag; in reality they induce a directed graph whose
      strongly-connected structure determines runtime liveness.
    status: approved
    priority: medium
    fix: >
      `validate_stream_pair_graph` (#142 (iii)). Tarjan-style SCC over
      the directed `producer → consumer` graph built from
      `StreamPair`s; SCCs of size ≥ 3 emit
      `StreamValidationIssue::Cycle`. Size-2 SCCs are excluded as the
      canonical bidirectional-pipe pattern. Confirmed by
      `meld-core::p3_stream::tests::ls_r_12_stream_three_component_cycle_flagged`
      plus negative test
      `bidirectional_pipe_is_not_flagged_as_cycle`.

  # ==========================================================================
  # Merger scenarios
  # ==========================================================================

  - id: LS-M-1
    title: Function base offset does not account for imported functions
    uca: UCA-M-3
    hazards: [H-3, H-3.1]
    type: inadequate-control-algorithm
    scenario: >
      Component B has 3 imported functions and 5 defined functions.
      The merger computes B's function base offset by counting only
      defined functions from preceding components, ignoring imports.
      The base offset is too small by the number of imports. All
      function references in B are shifted incorrectly [UCA-M-3],
      and calls in B target wrong functions [H-3.1].
    causal-factors:
      - Base offset calculation uses defined_function_count instead of
        total_function_count (imports + defined)
      - Imports and defined functions share the same index space in
        WebAssembly but are counted separately in some data structures

  - id: LS-M-2
    title: Rewriter misses memory index in memory.copy instruction
    uca: UCA-M-8
    hazards: [H-2, H-3.2]
    type: inadequate-control-algorithm
    scenario: >
      The rewriter handles memory.load, memory.store, memory.size, and
      memory.grow by remapping the memory index. However, memory.copy
      takes two memory indices (source and destination). The rewriter
      only remaps the first argument, leaving the second as the original
      per-component index [UCA-M-8]. In multi-memory mode, the copy
      reads from or writes to the wrong memory [H-3.2, H-2].
    causal-factors:
      - memory.copy has unusual two-memory-index encoding
      - Rewriter instruction visitor does not match on MemoryCopy variant

  - id: LS-M-3
    title: Element segment type indices remapped with wrong offset
    uca: UCA-M-4
    hazards: [H-3, H-3.4]
    type: inadequate-control-algorithm
    scenario: >
      An element segment references function types for call_indirect.
      The merger applies the function index offset instead of the type
      index offset when rewriting the element segment's type index
      [UCA-M-4]. At runtime, call_indirect compares against the wrong
      type, causing spurious traps [H-3.4].
    causal-factors:
      - Element segment reindexing code uses func_base instead of type_base
      - Element segments and function references share similar syntax

  # ==========================================================================
  # Adapter scenarios
  # ==========================================================================

  - id: LS-A-1
    title: cabi_realloc function index not remapped after merge
    uca: UCA-A-6
    hazards: [H-2, H-4, H-4.3]
    type: inadequate-process-model
    scenario: >
      The adapter generator records the cabi_realloc function index from
      the resolver's pre-merge analysis. After merging, function indices
      are rebased, but the adapter generator uses the stale pre-merge
      index for cabi_realloc [UCA-A-6]. The adapter calls the wrong
      function, which may not be an allocator, causing memory corruption
      [H-4.3] or a trap.
    causal-factors:
      - Adapter generation uses resolver output directly without applying
        index maps from the merger
      - No assertion that cabi_realloc index is within valid range
    process-model-flaw: >
      Adapter generator believes the cabi_realloc index is still valid
      because it was correct before merging.

  - id: LS-A-2
    title: Memory indices swapped in cross-memory copy
    uca: UCA-A-4
    hazards: [H-2, H-4]
    type: inadequate-control-algorithm
    scenario: >
      The adapter copies argument data from caller (memory 0) to callee
      (memory 1). The code emits memory.copy with src_mem=1 and
      dst_mem=0 (swapped) [UCA-A-4]. The copy reads uninitialized data
      from the callee's memory and writes it into the caller's memory,
      corrupting both [H-2].
    causal-factors:
      - Source/destination parameter ordering inconsistency between
        memory.copy wasm encoding and the adapter's internal API
      - No runtime test that verifies data actually arrives in callee memory

  - id: LS-A-3
    title: Inner pointer fixup loop uses wrong element stride
    uca: UCA-A-7
    hazards: [H-4, H-4.2]
    type: inadequate-control-algorithm
    scenario: >
      For list<record { name: string, age: u32 }>, the adapter fixup loop
      must step through elements at stride = canonical_abi_element_size
      (which includes alignment padding). The loop uses the unpadded sum
      of field sizes as stride [UCA-A-7]. After the first element, the
      loop reads pointer fields at incorrect offsets, corrupting the
      callee's data [H-4.2].
    causal-factors:
      - Element stride computed from raw field sizes, not
        canonical_abi_element_size
      - canonical_abi_element_size returns correct value but is not used
        in the fixup loop

  - id: LS-A-4
    title: Return value pointers read from caller memory instead of callee
    uca: UCA-A-9
    hazards: [H-2, H-4]
    type: inadequate-process-model
    scenario: >
      A cross-component call returns a string via retptr convention. The
      adapter reads the (ptr, len) pair from the caller's memory index
      instead of the callee's memory index [UCA-A-9]. The values at those
      addresses in the caller's memory are unrelated data, causing the
      caller to interpret garbage as a string [H-2, H-4].
    causal-factors:
      - Return path uses caller_mem_idx variable instead of callee_mem_idx
      - Asymmetry between argument lowering (caller->callee) and result
        lifting (callee->caller) is error-prone
    process-model-flaw: >
      Adapter generator believes the return pointer is in the caller's
      memory because the caller is the one who will use the result.

  # ==========================================================================
  # Control path scenarios (type b: improperly executed control actions)
  # ==========================================================================

  - id: LS-CP-1
    title: Rewriter produces invalid wasm encoding
    type: control-path
    scenario: >
      The rewriter correctly determines the new index for an instruction
      but emits the LEB128 encoding incorrectly (e.g., uses signed
      encoding where unsigned is required). The wasm binary is malformed,
      causing validation failure or undefined behavior in the runtime.
    hazards: [H-1]
    causal-factors:
      - LEB128 encoding logic bug
      - No round-trip validation of rewritten instructions

  - id: LS-CP-2
    title: Hash map iteration order causes non-deterministic output
    type: control-path
    scenario: >
      The merger or resolver iterates over a HashMap to emit exports or
      resolve imports. HashMap iteration order is non-deterministic across
      runs (Rust's default hasher uses randomization). The output module
      contains sections in different orders [H-7], breaking
      reproducibility [L-4].
    hazards: [H-7]
    causal-factors:
      - Use of HashMap instead of BTreeMap or IndexMap for order-sensitive
        data
      - No byte-level reproducibility test

  - id: LS-CP-3
    title: HashMap iteration leaks into adapter_sites order and caller_encoding fallback
    type: control-path
    scenario: >
      Two sites in `meld-core/src/resolver.rs` propagate HashMap
      iteration order into observable fusion output:

      (1) `identify_adapter_sites` iterates `graph.resolved_imports` (a
      `HashMap<(usize, String), (usize, String)>`) and pushes each
      cross-component call site into `graph.adapter_sites` in iteration
      order. Rust's default hasher randomises per-process, so the same
      input produces different `adapter_sites` orders across builds. The
      order is observable downstream:
        * `lib.rs:413-414` allocates merged function indices as
          `adapter_base + adapter_offset`, so a different push order
          yields different merged function indices for the same logical
          adapters,
        * `merger.rs:1500` walks `adapter_sites` and takes the first
          match for an `(import_name, import_module)` pair, so when two
          sites share that pair the merged module routes calls to
          whichever was pushed first.

      (2) Three encoding-fallback sites (`identify_adapter_sites` ~line
      2638, the second resource path ~line 2965, and
      `find_lower_for_intra_import` Strategy 3) used
      `caller_lower_map.iter().next()` / `lower_map.iter().next()` to
      pick a `string_encoding` when name-based matching missed. The
      chosen encoding (UTF-8 vs UTF-16) and the `string_transcoding`
      flag could flip across builds when a component had multiple
      `canon lower` entries and the consumer's import name didn't match
      any of them.

      The 0.3.0 Mythos delta-pass fix sorted `reexporter_components` and
      `reexporter_resources` (commit 8d7fb8f) but missed both classes
      above. Result: byte-equal builds aren't guaranteed across
      processes, breaking SR-19 reproducibility [H-7], and the routed
      call (case 1) or chosen encoding (case 2) varies silently across
      builds. Detected by unit tests
      `meld-core::resolver::tests::test_issue112_item4_sort_adapter_sites_is_canonical`
      and the integration test
      `tests/issue_112_mythos_v04.rs::issue112_item4_adapter_sites_determinism`,
      and Kani harness `check_item4_sort_is_canonical_under_swap`. Fix
      lands in commit on branch fix/issue-112-mythos-v04-followup:
      extract a free function `sort_adapter_sites_for_determinism` and
      call it after both `identify_adapter_sites` and
      `identify_intra_component_adapter_sites` complete; replace each
      `iter().next()` encoding fallback with
      `iter().min_by_key(|(k, _)| **k)`. The sort key is the totally-
      ordered tuple (from_component, from_module, import_module,
      import_name, to_component, to_module, export_name,
      export_func_idx).
    hazards: [H-7]
    causal-factors:
      - >-
        `identify_adapter_sites` walks a `HashMap` and pushes results in
        iteration order without normalising
      - >-
        Three `caller_lower_map.iter().next()` / `lower_map.iter().next()`
        encoding fallbacks pick a non-deterministic entry from a
        `HashMap<u32, _>`
      - >-
        Downstream consumers (lib.rs adapter index allocation,
        merger.rs first-match) treat the `adapter_sites` slot order as
        meaningful
      - >-
        `test_resolver_preserves_order_stability` covers
        `instantiation_order` only, leaving `adapter_sites` and the
        encoding fallback un-asserted
      - >-
        The 0.3.0 fix sorted `reexporter_components` and
        `reexporter_resources` but did not sort `adapter_sites` itself
        nor stabilise the encoding fallbacks
    status: approved
    priority: high

  - id: LS-CP-4
    title: DWARF passthrough emits address-incorrect debug info on fused output
    type: control-path
    scenario: >
      Each input core module's `.debug_*` custom sections are pushed
      verbatim into the fused module by `merger.rs` (around line 2010)
      and emitted by `lib.rs::encode_output` whenever
      `CustomSectionHandling != Drop`. Every DWARF address inside those
      sections is a byte offset into the ORIGINAL per-input code section.
      The fuser rewrites and renumbers function bodies into a single
      merged code section, so every passed-through DWARF address
      references the wrong instruction (or nothing). Downstream MC/DC
      tooling (`pulseengine/witness`) trusts the `(code-offset -> file,
      line)` map produced by `gimli` and therefore attributes branch
      decisions to incorrect source lines [H-7]. Wrong attribution is
      strictly worse than no attribution because witness has a
      no-DWARF fallback that degrades gracefully — the lossy
      passthrough silently subverts that fallback.

      Phase 2 of issue #130 will add an address-remap pass over
      `.debug_line` / `.debug_info` / `.debug_ranges`. Until then the
      only non-corrupting policy is to drop `.debug_*` sections.

      Phase 1.5 lands an explicit `DwarfHandling` enum
      (`Strip` default, `PassThrough` opt-in) on `FuserConfig`,
      filters `.debug_*` in `lib.rs::encode_output` when `Strip`, and
      records the choice in attestation `tool_parameters` so consumers
      can detect lossy emissions. Verified by
      `meld-core/tests/dwarf_strip.rs`.
    hazards: [H-7]
    causal-factors:
      - >-
        `merger.rs` accumulates per-input `.debug_*` sections without
        rewriting their internal addresses
      - >-
        `lib.rs::encode_output` had no `.debug_*`-aware policy; the
        only knob was the generic `CustomSectionHandling` switch
      - >-
        Witness consumes the emitted DWARF and treats it as authoritative
        for `(code-offset -> file, line)` mapping
      - >-
        Strip is correct-but-lossy; PassThrough is corrupting-but-loud;
        Phase 2 (remap) is the eventual correct-and-lossless mode
    status: approved
    priority: high

  # ==========================================================================
  # Additional adapter scenarios (discovered during gap analysis)
  # ==========================================================================

  - id: LS-A-5
    title: Conditional pointer not checked for option/result/variant
    uca: UCA-A-12
    hazards: [H-9, H-4]
    type: inadequate-control-algorithm
    scenario: >
      A cross-component call passes option<string> with value None. The
      adapter does not check the discriminant (0 = None, 1 = Some). It
      unconditionally copies 8 bytes as a (ptr, len) pair from after the
      discriminant. These bytes are uninitialized or belong to other data.
      The callee interprets them as a valid string pointer and traps or
      reads garbage [H-9]. Conversely, when the value is Some(string),
      an adapter that always skips the copy leaves the callee with a
      null pointer [H-4].
    causal-factors:
      - Adapter generator does not receive conditional_pointer_pairs from
        resolver
      - No if/end block emitted around pointer copy instructions
      - Missing test case for option<string> with None value

  - id: LS-A-6
    title: Retptr layout incorrect for variant return types
    uca: UCA-A-13
    hazards: [H-4, H-4.5]
    type: inadequate-control-algorithm
    scenario: >
      A cross-component call returns result<string, error-code> via retptr
      convention. The return area has slots: [discriminant: 1 byte at
      offset 0] [payload: 8 bytes at offset 4 due to alignment]. The
      adapter copies the return area as a flat sequence of i32 values
      (4 bytes each), missing the alignment gap between discriminant and
      payload. The callee reads the payload at the wrong offset [H-4.5],
      interpreting garbage as a string pointer.
    causal-factors:
      - Adapter uses flat_byte_size / 4 as number of i32 slots instead
        of computing per-slot layout from canonical ABI alignment rules
      - Return area slot offsets not communicated from resolver to adapter
      - Missing test case for variant retptr with alignment padding

  - id: LS-A-7
    title: Transcoding adapters emit unchecked i32.mul for realloc size
    uca: UCA-A-5
    hazards: [H-2, H-4, H-4.3]
    type: inadequate-control-algorithm
    scenario: >
      A cross-component call passes a string whose length is chosen by an
      untrusted caller. The transcoding adapters emitted in
      meld-core/src/adapter/fact.rs at emit_utf8_to_utf16_transcode
      (lines 2702-2712), emit_utf16_to_utf8_transcode (lines 3010-3020),
      and emit_latin1_to_utf8_transcode (lines 3335-3344) compute the
      destination allocation size as LocalGet(len); I32Const(K); I32Mul;
      Call(cabi_realloc); LocalSet(out_ptr) with K in {2, 3, 2}. The
      multiplication is performed in 32-bit wrapping arithmetic with no
      upper-bound check on len and no I32Eqz/BrIf guard on the
      cabi_realloc return value. For any len > u32::MAX / K the product
      wraps to a small alloc_size, cabi_realloc returns a short buffer
      (or null on OOM, which is also unchecked), and the transcode loop
      proceeds using the untouched full len as its bound, producing an
      out-of-bounds write into the callee's linear memory [UCA-A-5]. This
      corrupts callee memory at caller-chosen offsets [H-4.3] and covers
      address 0 on realloc failure [H-2]. Violates WebAssembly Component
      Model Canonical ABI (commit deb0b0a) Section 3.10 "Canonical
      Built-in Definitions", which requires the host to trap when
      realloc returns 0, and WebAssembly Core Specification Release 3.0
      Section 4.4.1 which defines i32.mul as modulo 2^32. Detected by
      Kani harness
      meld-core::adapter::fact::tests::kani_transcode_alloc_size_no_overflow_guard
      (counterexample at any len > u32::MAX / K) and PoC byte-scan
      meld-core::adapter::fact::tests::poc_transcode_adapter_emits_unchecked_mul
      which asserts presence of (a) I32Eqz/BrIf after the cabi_realloc
      Call and (b) a len upper-bound check before I32Mul; both
      assertions fail on the current emitter.
    causal-factors:
      - Allocation size computed via I32Mul without widening len to i64
        or bounding len < u32::MAX / K before the multiply
      - cabi_realloc return value stored directly into out_ptr with no
        I32Eqz/BrIf trap on null
      - Transcode loop bound is the untouched caller-supplied len, so a
        wrapped alloc_size does not shrink the number of bytes written
      - No emitter-level test asserting that every transcode adapter
        emits both the overflow guard and the realloc-null guard
    related-cve: CVE-2026-27572
    status: approved
    priority: critical

  - id: LS-A-8
    title: Inner-list rep_func selected by HashMap-iteration order
    uca: UCA-A-7
    hazards: [H-4, H-4.2]
    type: inadequate-control-algorithm
    scenario: >
      For a `list<record { x: borrow<A>, y: borrow<B> }>` (or any list
      whose element carries a `borrow<T>`), the params-area memcpy and
      param_copy_layouts paths in meld-core/src/adapter/fact.rs at
      `compute_adapter_options` (~line 960) and the
      `generate_params_ptr_adapter` emission (~line 1971) walked the
      inner_resources list and called `resource_rep_imports.values()
      .next()` to pick a `[resource-rep]` import for each element. When
      the callee imports more than one resource type, that pick is
      arbitrary (HashMap iteration order is not defined and varies
      across builds), so the adapter routinely emits the wrong rep_func
      for the borrow handle: a memory-pointer of resource A is then
      dereferenced inside the callee as if it were `_BRep<B>`. Result is
      silent rep-vs-handle confusion across the cross-component handle
      boundary [UCA-A-7] — the fused output is structurally valid wasm
      but semantically wrong [H-4 / H-4.2], which the discover prompt
      flags as the highest-amplification failure mode (downstream
      runtimes consume the silently-broken module). Detected by
      Kani harness
      meld-core::adapter::fact::tests::kani_inner_resource_picks_correct_rep_func
      and differential PoC fixture proving the wrong rep_func crashes a
      multi-resource list-borrow chain. Fix lands in commit f0e981b:
      `resolver::InnerResource` now carries a pre-resolved `rep_import`
      filled at site-requirements time via the callee's
      resource_type_to_import map; fact.rs looks up rep_func per type
      rather than via `.values().next()`. When a type lacks an import
      mapping the fixup is skipped with a warning rather than emitting
      a wrong-rep_func instruction.
    causal-factors:
      - Inner-resource fixup discarded `resource_type_id` and used
        `resource_rep_imports.values().next()` for every entry
      - HashMap iteration order is non-deterministic, so the same
        fixture could route correctly on one build and wrong on another
      - No emitter-level test asserting per-type rep_func selection
    status: approved
    priority: high

  - id: LS-A-9
    title: Async callback POLL falls through to YIELD path
    uca: UCA-F-3
    hazards: [H-3]
    type: inadequate-control-algorithm
    scenario: >
      `FactStyleGenerator::generate_async_callback_adapter` in
      meld-core/src/adapter/fact.rs (~lines 4071-4119) dispatched
      `[waitable-set-poll]` only when the guest's callback return code
      equalled `callback::WAIT (2)`. The spec rustdoc on
      `meld_core::p3_async::callback::POLL (3)` requires POLL to also
      dispatch the host poll (POLL is the non-blocking variant of WAIT
      against the same call). The pre-fix `if code == WAIT` branch
      treated POLL as falling through to the else arm, which sent
      `(EVENT_NONE, 0, 0)` to `[callback]` and dropped any event the
      host had ready. Effect: a guest legitimately returning POLL never
      sees the event it is polling for, even when the host has it
      ready — the fused module diverges from the composed module on
      P3 async export call paths [UCA-F-3]. Hazards: H-3
      (semantic-preservation violation). Detected by Kani harness
      `kani_trampoline_dispatches_poll_like_wait` and PoC
      `async_callback_trampoline_dispatches_poll`. Fix: branch on
      `code == WAIT || code == POLL` (an `I32Eq + I32Eq + I32Or` pair
      replaces the single `I32Eq`). Existing
      `async_callback_return_codes_pinned` /
      `async_callback_trampoline_shape_canonical` tests pin the
      *constants* / *bit layout* but not the *dispatch decision*, so
      they did not catch this.
    causal-factors:
      - Single-arm `I32Eq` against `callback::WAIT` instead of
        `WAIT || POLL`
      - Comment at L4069-4070 claimed POLL goes through the same path,
        but the code did not implement it
      - Pin tests covered constants and bit layout, not dispatch
    status: approved
    priority: high

  - id: LS-A-10
    title: Async-lift retptr writeback skips CABI alignment padding
    uca: UCA-A-13
    hazards: [H-4, H-4.5]
    type: inadequate-control-algorithm
    scenario: >
      Both `FactStyleGenerator::generate_async_callback_adapter` and
      `FactStyleGenerator::generate_async_stackful_adapter` in
      meld-core/src/adapter/fact.rs (pre-fix lines ~4240-4277 and
      ~4686-4723) wrote each task.return shim result global to the
      caller's retptr buffer by advancing the byte offset by only the
      flat size of the value (4 bytes for i32/f32, 8 bytes for i64/f64)
      and never aligning up to the next field's natural alignment. For a
      P3 async lift whose flat-lowered result globals contain `[I32,
      I64]` — e.g. a record `{u32, u64}`, tuple `(s32, s64)`, or
      `result<u64, u32>` — the canonical ABI requires the i64 at offset
      8 (i32 at 0, 4 bytes padding, i64 at 8, record size 16). The
      adapter wrote the i64 at offset 4. Wasm engines treat
      `MemArg.align` as a hint and do not trap on misalignment, so the
      bug is silent data corruption: the caller's canon.lower reads the
      retptr per canonical ABI and sees stale/zero bytes at offset 8
      [H-4, H-4.5]. Affects every downstream runtime consuming a meld-
      fused module (kiln, wasmtime, browsers) because the misalignment
      is baked into the emitted wasm. Surfaced by the v0.8.0 pre-release
      Mythos delta-pass on `adapter/fact.rs`; PoC test
      `cabi_alignment_stackful_retptr_writes_i64_at_offset_8`
      reproduces with a concrete `[I32, I64]` result-global pair. Fix:
      extracted shared helper `emit_globals_to_retptr_cabi` that calls
      `align_up(offset, natural_align(val_ty))` before each store; both
      emitters now route through this single CABI-correct writeback.
    causal-factors:
      - Offset advanced by flat size, never aligned up to the next
        field's natural alignment
      - Both emitters carried the same defect — the recent step 0.5
        refactor for code reuse did not cover the retptr writeback, so
        the bug remained duplicated across the two emitters
      - Pin tests covered opcode shape (call/drop/global.get/end) and
        the simple push-results-on-stack path, but no test exercised
        the retptr writeback with mixed-size aggregate results
      - Wasm `MemArg.align` is a hint; engines do not trap on
        misalignment, so the bug is invisible at runtime
    status: approved
    priority: high

  - id: LS-A-11
    title: Extended-const initializer / offset expression silently truncated
    uca: UCA-M-6
    hazards: [H-1, H-2, H-3.3]
    type: inadequate-control-algorithm
    scenario: >
      Two const-expression parsers in meld-core read only the first
      operator of an init expression and discarded the rest. Affected
      sites: `meld-core/src/segments.rs::parse_const_expr_with_value`
      (parses data / element segment offset expressions; pre-fix at
      lines 369-425) and `meld-core/src/merger.rs::convert_init_expr`
      (parses global initializer expressions; pre-fix at lines
      2771-2844). Any input whose const expression uses the WebAssembly
      2.0 `extended-const` proposal — `(i32.const A)(i32.const B)
      i32.add` and friends — was silently truncated to its first
      constant. Concrete impact: a data segment `(data (offset
      (i32.const 5)(i32.const 10) i32.add) "...")` landed at offset 5
      instead of 15; a global `(global i32 (i32.const 100)(i32.const 23)
      i32.add)` was emitted with init value 100 instead of 123;
      element-segment offsets and table fills land at wrong slots. Wasm
      validator accepts both inputs because the truncated form is still
      a well-typed single const. Affects every downstream runtime;
      silent data corruption with no trap [H-1 semantic divergence,
      H-2 wrong memory address, H-3.3 index/init-expr stopped too
      soon]. Wasmparser 0.246 (meld's bundled version) enables
      `WasmFeatures::extended_const` by default, so any input authored
      after wit-bindgen / clang-wasi grew extended-const support can
      trigger this. Surfaced by the v0.8.0 Mythos delta-pass on
      segments.rs and merger.rs (#151 gate). Fix: shared helpers
      `fold_extended_const_i32` / `fold_extended_const_i64` in
      `segments.rs` walk all operators with a small stack-machine
      interpreter, applying `i32.add` / `i32.sub` / `i32.mul` (and i64
      counterparts) with wrapping semantics, and return the folded
      scalar value. Both emitters route through these helpers. Regression
      pinned by 6 tests (4 in segments, 2 in merger) including all three
      arithmetic ops and the single-const passthrough case.
    causal-factors:
      - "`OperatorsReader::read` was called exactly once; subsequent operators were silently discarded"
      - Extended-const proposal was enabled in wasmparser via default
        features but no upstream test in meld exercised it
      - Both parsers (segments.rs and merger.rs) had the same bug,
        independently — a refactor would have surfaced it earlier
      - No "shape" test pinned the full operator sequence — existing
        tests checked the round-tripped value for single-const inputs
        only
    status: approved
    priority: high

  - id: LS-A-15
    title: HashMap iteration non-determinism in resource / realloc lookups
    uca: UCA-M-10
    hazards: [H-7, H-3, H-4.3]
    type: inadequate-control-algorithm
    scenario: >
      Three sites in `meld-core` resolved cross-component routing via
      `HashMap::iter().find(...)` over keyed maps. HashMap iteration
      order is hash-seed-randomised per process, so when more than one
      entry matched the lookup predicate the chosen entry varied
      across runs — producing **non-reproducible** fused output bytes
      and, in some cases, routing a call to the wrong target on a
      given run.

      Affected sites:
      * `merger.rs::component_realloc_index` (lines 2907-2919) — when
        a component has multiple modules each carrying a
        `cabi_realloc` and module 0 is not among them, the fallback
        picked whichever module HashMap iteration visited first. The
        chosen realloc may be bound to a different linear memory than
        the calling site, producing cross-memory address corruption
        [H-4.3].
      * `merger.rs` handle-table fallbacks (~lines 1040 and 1090-1100)
        — when looking up a handle table by `(any-owner, iface, rn)`
        or `(any-owner, any-iface, rn)`, ties were broken by iteration
        order.
      * `resolver.rs::resolve_resource_positions` last-resort fallback
        (lines 1295-1308) — `by_type_id.iter().find(|((_, k), _)| ...)`
        on `[resource-rep]` / `[resource-new]` / `[resource-drop]`
        prefix collisions returned an arbitrary import; cross-resource
        confusion at the adapter call site [H-3].

      Validator does not catch any of these because the structural
      types match across candidates (all reallocs share
      `(i32, i32, i32, i32) -> i32`; all resource-rep imports share
      `(i32) -> i32`).

      Fix: collect candidate keys, sort, then pick `.first()`.
      `component_realloc_index` now deterministically chooses the
      lowest module index. Resource fallback picks the lowest type-id
      with the matching prefix. Handle-table fallbacks pick the
      lexicographically smallest `(owner, iface, rn)` tuple. Picks may
      still be wrong if multiple distinct resources share a prefix
      (Step 6 alias propagation is the right structural mitigation),
      but the output is now reproducible across runs.

      Hazards: H-7 (non-deterministic output for identical inputs),
      H-3 (cross-component reference integrity when the wrong target
      is chosen), H-4.3 (canonical-ABI realloc bound to wrong memory).
    causal-factors:
      - "`HashMap::iter().find(predicate)` was used as a \"pick any matching\" idiom without recognising that the choice is hash-seed-randomised"
      - No reproducibility test on the fuser's output bytes for
        inputs with multi-module realloc or with prefix-collision
        resource imports
      - Three distinct sites carried the same bug pattern in
        different files; a refactor pass would have surfaced them
        together
    status: approved
    priority: high

  - id: LS-A-17
    title: Resource graph definer purge and terminal-exporter passes ignore (iface, rn)
    uca: UCA-F-2
    hazards: [H-3, H-1]
    type: inadequate-control-algorithm
    scenario: >
      Two distinct passes in `meld-core/src/resource_graph.rs::ResourceGraph::build`
      filtered the wrong dimension of the (component, interface,
      resource_name) tuple, conflating distinct resources that shared
      either a resource name or an interface family.

      (a) The "definer purge" pass (lines 279-308) removed defines_cache
      entries with `filter(|(idx, _iface, r)| *idx == from_comp && r == rn)`
      — the interface was explicitly ignored. A component that imported
      `[resource-rep]X` from interface `I_x` AND defined its own
      `[resource-rep]X` in unrelated interface `I_y` lost the
      (comp, I_y, X) definer entry. Same-resource-name across different
      interfaces is permitted by the Component Model.

      (b) The "terminal exporter" pass (lines 242-264) classified a
      component as a re-exporter (not a definer) if any of its imports
      carried any resource interface — even resources entirely
      unrelated to the iface being attributed. A consumer that imported
      `wasi:io/poll` alongside an app-defined resource interface
      mis-classified the app's true definer as a re-exporter.

      Both bugs led to wrong handle-table allocation downstream:
      handle-table allocated for the wrong owning component, or no
      handle table at all, with `resource_definer` returning None.
      Subsequent `resource.rep` calls in the merger fell back to the
      first matching HT (LS-A-15 family) and dereferenced foreign rep
      data — cross-component handle confusion with no host trap.

      Fix:
      * Definer purge: restrict the filter to the specific
        `(comp, iface, rn)` tuple captured in `matching_resource_ifaces`.
      * Terminal exporter: scope `to_also_imports_resource` to the
        specific iface being attributed (and its `[export]`-prefixed
        variants), so unrelated resource imports no longer disqualify
        the definer.
    causal-factors:
      - "Cleanup filter discarded the iface dimension of the (idx, iface, rn) tuple"
      - "`to_also_imports_resource` checked `resource_nodes.keys().any(...)` against ANY iface rather than the iface under attribution"
      - No upstream test exercised same-resource-name-across-different-interfaces or unrelated-resource-import cases
    status: approved
    priority: high

  - id: LS-A-18
    title: Resource graph silently drops [resource-drop] imports for non-pure-consumer components
    uca: UCA-F-2
    hazards: [H-3]
    type: inadequate-control-algorithm
    scenario: >
      `ResourceGraph::build` had two passes that registered resource
      nodes from core module imports. The first pass (`if has_rep ||
      has_new`, ~lines 124-172) handled `[resource-rep]` and
      `[resource-new]` prefixes but silently skipped
      `[resource-drop]`. The second pass (lines 186-197) handled all
      three prefixes — but only fired when `!has_any_canon` (the
      component has no canonical ResourceRep/New of its own).

      A re-exporter (has ResourceNew on some resource X) that ALSO
      imports `[resource-drop]Y` for a foreign resource Y never
      registered Y in the graph: the first pass didn't recognise drop
      prefixes, and the second pass was skipped because the component
      has canonical entries. Downstream, the merger's
      `defines_resource`/`resource_definer` lookups for Y returned
      empty, and the drop call was routed via the first matching
      handle-table fallback (LS-A-15 family) — invoking a foreign
      dtor on a foreign rep, which is UB inside the guest with no
      host trap [H-3, H-7 inside-guest].

      Fix: the first pass now also strips `[resource-drop]` and
      registers an `ImportsFrom` edge for those, matching the second
      pass's behaviour. A `ResourcePrefixKind` enum makes the match
      arms explicit. The second pass is kept as a fallback for pure-
      consumer components.
    causal-factors:
      - First pass only matched `[resource-rep]` and `[resource-new]`; the symmetric `[resource-drop]` arm was missing
      - Second pass was gated on `!has_any_canon`, leaving a gap for components that participate in resource handling AND drop foreign resources
      - No test exercised a re-exporter that drops a non-self-owned resource
    status: approved
    priority: high

  - id: LS-A-19
    title: Resource import dedup tracking uses ends_with() suffix match
    uca: UCA-M-9
    hazards: [H-1, H-10]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/merger.rs::Merger::add_unresolved_imports` includes
      a dedup-skip path (~lines 2127-2153) that, on a duplicate
      `(module, field)` import, propagates the existing
      `resource_rep_by_component` / `resource_new_by_component`
      entry to the new component. The lookup uses
      `imp.name.starts_with("[resource-rep]") && imp.name.ends_with(rn)`.

      `ends_with(rn)` matches **any** import whose name ends with the
      resource name. For two distinct resources whose names share a
      suffix (`float` and `bigfloat`), the lookup matches both, and
      `.find()` returns whichever the HashMap iterates first (also
      LS-A-15 territory). The wrong import index is then stored in
      `resource_rep_by_component`, and any subsequent
      `[resource-rep]float` call on the second component routes to
      the `bigfloat` import. Validator passes — both imports share
      `(i32) -> i32` — but the runtime reads a `bigfloat` rep as a
      `float`, producing type confusion with no trap [H-10].

      Fix: replace the suffix match with an exact match against
      `format!("[resource-{rep,new}]{rn}")`. The dedup-skip path now
      tracks only the import that exactly matches the resource name
      being deduped.
    causal-factors:
      - "`ends_with(rn)` matched suffix-overlap names without requiring exact equality"
      - HashMap iteration tie-broken arbitrarily on a multi-match (compounded by LS-A-15)
      - No test exercised resource names with shared suffix (`float` / `bigfloat`)
    status: approved
    priority: high

  - id: LS-A-20
    title: flags<N> canonical ABI silently modeled as Record<N × Bool>
    uca: UCA-P-10
    hazards: [H-4, H-4.1]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/parser.rs::convert_wp_defined_type` (the
      `Flags(names) =>` arm at lines 3002-3015) mapped a Component-
      Model `flags<N>` to `ComponentValType::Record(N × Bool)`. The
      downstream canonical-ABI helpers (`flat_count`,
      `canonical_abi_size_unpadded`, `canonical_abi_align`,
      `flat_byte_size`, `collect_return_area_type_slots`,
      `cabi_size_align` in adapter/fact.rs, and the wrapper's
      `flat_component_val_type_resolved`) then computed
      record-of-bool layouts: flat=N, size=N bytes, align=1.

      The Component-Model canonical ABI for `flags<N>` is
      fundamentally different: `flat = ceil(N/32)` i32 storage words,
      `size = ceil(N/8)` padded to its storage class (1/2/4/8/...
      bytes), `align ∈ {1, 2, 4}` from the power-of-2 storage class.

      Concrete impact: a function taking `flags<17>` as a parameter
      has flat_count=1 (one i32) per spec, but meld computed 17
      flat values. The resolver's "params-ptr threshold" check fires
      at `total_flat_params > 16` — meld would flip into the
      params-ptr calling convention for the same function the
      producer kept on the flat path, mismatching call conventions
      between fused and composed paths. Smaller N values (e.g.
      flags<9>) produced wrong size (9 bytes vs spec's 2) and wrong
      align (1 vs spec's 2), so adjacent fields in records
      mis-aligned.

      The bug existed since the Flags arm was added in commit
      d7a5ddb (2026-03-09, ~2 months and multiple releases). Wasm
      validator does not catch it because the truncated layout is
      internally consistent within meld's own pipeline; the
      divergence only surfaces when the fused output is called by a
      caller that lowered against the spec.

      Fix: add a `ComponentValType::Flags(Vec<String>)` variant
      (preserving names for diagnostics), have the parser produce it
      directly, and add explicit Flags arms to every canonical-ABI
      function that walks ComponentValType. The arms compute the
      spec-correct flat / size / align values directly from the
      flag count.
    causal-factors:
      - "Flags was modelled as a Record of Bools as a simplification \
        at parser bridge time, no helper recognised the special-case canonical-ABI layout"
      - "No upstream test exercised flags<N> for any N that exposed the divergence"
      - "Bug shape matches UCA-P-10 ('unrecognized types mapped to Other'): \
        a structurally valid type misclassified at the parse boundary, propagating \
        wrong layout decisions to downstream code generators"
    status: approved
    priority: high

  - id: LS-A-12
    title: uses_stackful_lift mis-classifies mixed-mode components
    uca: UCA-A-3
    hazards: [H-1, H-3]
    type: inadequate-control-algorithm
    scenario: >
      `P3AsyncFeatures::uses_stackful_lift()` was derived as
      `uses_async_lift && !uses_callback_lift` — a conjunction of two
      component-wide existential flags. In a mixed-mode component that
      declares one callback-mode async lift AND one stackful-mode async
      lift, `uses_async_lift = true` and `uses_callback_lift = true`,
      so the derived predicate returned `false` even though a stackful
      lift was present. Downstream consumers following the rustdoc
      contract ("dispatch the stackful emitter / surface the 'stackful
      not yet emitted' error iff `uses_stackful_lift()`") would
      silently classify the mixed-mode component as callback-only and
      either skip a needed stackful adapter or skip the documented
      reject. The bug was in code shipped in #146 / v0.8.0 (Phase 1
      ABI foundation); the Phase 1 truth-table test only checked
      single-lift cases. Fix tracks the stackful presence via a new
      independent field `uses_stackful_lift_internal: bool` set per-
      lift in `detect_features`. The two flags are now independent:
      `uses_callback_lift` = "any lift has callback", and
      `uses_stackful_lift_internal` = "any lift is stackful". A
      component with both kinds correctly reports both as true.
    causal-factors:
      - Component-wide ANY-flags conjuncted into a derived predicate
        that needs per-lift information
      - Phase 1 truth-table test
        (`stackful_lift_is_async_without_callback`) exercised only
        single-lift cases, not mixed-mode
      - The dispatcher in `adapter/fact.rs` already routes per-site
        based on the merged module's `[callback]<export>` companion,
        so the bug never reached the emitter — but external consumers
        (kiln, downstream tooling) following the public API would
        misroute
    status: approved
    priority: medium

  - id: LS-A-13
    title: StreamWriteResult::decode silently folds over-count into Complete
    uca: UCA-A-5
    hazards: [H-1, H-2]
    type: inadequate-control-algorithm
    scenario: >
      `StreamWriteResult::decode(ret, requested)` previously classified
      any non-negative `ret` with `written >= requested` as
      `Complete { written }`, including the out-of-contract
      `written > requested` case. The ABI contract on
      [`HostIntrinsic::StreamWrite`] is `n == data_len` ⇒ Complete,
      `0 <= n < data_len` ⇒ Partial, `n < 0` ⇒ Error/Unknown. A buggy
      or hostile runtime returning `n > data_len` would silently drive
      callers to advance their producer cursor past the source buffer
      — silent off-by-many corruption with no trap. Fix splits the
      check into three explicit arms: `==` ⇒ Complete, `<` ⇒ Partial,
      `>` ⇒ Unknown(ret). The Unknown classification signals "contract
      violation, do not advance" rather than treating it as success.
    causal-factors:
      - "`>=` comparison conflated the spec-correct exact-match case with the spec-violating over-count case"
      - No upstream test in p3_async for the over-count scenario
      - Decoder is the runtime→adapter contract enforcer; a
        misclassifying decoder is functionally identical to an
        unvalidated runtime
    status: approved
    priority: medium

  - id: LS-A-14
    title: detect_features substring matching misclassifies future<stream<...>>
    uca: UCA-P-10
    hazards: [H-3, H-4]
    type: inadequate-control-algorithm
    scenario: >
      `detect_features` classified P3Async component-level types using
      `desc.contains("stream")` / `desc.contains("future")` on the
      human-readable type description. A nested type like
      `future<stream<u8>>` matched the "stream" substring first (the
      first `else if` branch never ran), so the type landed in
      `stream_types` instead of `future_types`. The
      `future_types`/`stream_types` sets are part of the public
      `P3AsyncFeatures` surface (rustdoc presents them as the canonical
      inventory for downstream consumers). A consumer iterating
      `future_types` to wire `future_*` intrinsics, or to compute T's
      canonical layout for `future_read`'s buffer-size argument, would
      miss every nested-stream future and emit a wrong layout. Fix
      classifies on the **root constructor** of the description (the
      prefix up to the first `<`), not on substring containment.
    causal-factors:
      - Substring match used where a structural / root-constructor
        match was required
      - Public surface API (`future_types` / `stream_types` vectors)
        carries ABI-relevant information through a free-form `String`
        description — fragile by construction
      - No test exercised nested-stream future types
    status: approved
    priority: medium

  - id: LS-A-16
    title: Wrapper drops source canonical options (lift type + string encoding)
    uca: UCA-W-2
    hazards: [H-1, H-4]
    type: inadequate-control-algorithm
    scenario: >
      `meld-core/src/component_wrap.rs::find_lift_type_for_interface_func`
      took `interface_name` and `func_name` parameters, built
      `target_export_name = format!("{}#{}", interface_name, func_name)`,
      then never compared the result against anything — `let _ =
      target_export_name` at the bottom suppressed the unused warning.
      Strategy 1 returned the **first** lift entry that had any matching
      `ComponentFuncDef::Lift`; Strategy 2 returned the **first** lift
      entry, period. For a component with N lifted exports, every
      wrapper canon-lift section was emitted with the type and
      canonical options of whichever lift the parser recorded first.
      Mixed string-encoding components (e.g. one UTF-8 export and one
      UTF-16 export, both via wit-bindgen) had every export silently
      downgraded to whatever encoding the first lift carried. Wasm
      validator accepts the wrapper output because the wrong-encoding
      lift still type-checks against the wrapper interface; downstream
      wasmtime transcodes against the wrong encoding, producing
      mojibake / truncated strings with no trap. Same family as the
      wasmtime 2026-04-09 CM-transcoding CVE wave. The bug also
      hardcoded the lift's `string_encoding` to `UTF8` regardless of
      the source component's declaration. Fix routes lift lookups via
      the export-name match (matching the wit-bindgen `{iface}#{func}`
      convention) and propagates the source `CanonStringEncoding`
      through a new `source_string_encoding_option` helper. Lower-side
      encoding propagation and lift-side `Memory(0)` hardcoding in
      multi-memory mode remain deferred — they need additional
      threading of source memory indices through the wrapper which is
      tracked under the same UCA but lands in a follow-up.
    causal-factors:
      - Function took (iface, func) parameters but never used them;
        explicit `let _ = target_export_name` suppressed the unused
        warning, making the bug look intentional
      - String-encoding was hardcoded UTF-8 in lift emission paths,
        not derived from source canonical options
      - No upstream test exercised a multi-lift / mixed-encoding
        component
    status: approved
    priority: high

