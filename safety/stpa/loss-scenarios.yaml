  - id: LS-M-4
    title: Import dedup conflates type-incompatible imports
    uca: UCA-M-9
    hazards: [H-10, H-1]
    type: inadequate-control-algorithm
    scenario: >
      Component A imports wasi:cli/environment.get-environment with type
      () -> list<(string, string)>. Component B imports the same function
      but with a different type index in the merged module. The merger
      deduplicates them into a single import using component A's type.
      Component B's call uses the wrong type, causing a type mismatch
      trap or silent argument corruption [H-10].
    causal-factors:
      - Dedup key is (module, field) without considering type signature
      - In multi-memory mode, same function may need different per-component
        canon lower with different memory/realloc

  # ==========================================================================
  # Wrapper scenario (discovered during gap analysis)
  # ==========================================================================

  - id: LS-W-1
    title: Wrapper hardcodes Memory(0) for all WASI import lowering
    uca: UCA-W-2
    hazards: [H-8, H-2]
    type: inadequate-process-model
    scenario: >
      A fused module has two memories (memory 0 for component A, memory 1
      for component B). The wrapper lowers all WASI imports with
      CanonicalOption::Memory(0). Component B calls get-environment which
      writes results to memory 0. Component B's code then reads the retptr
      from memory 1, where no data was written. The pointer is out of
      bounds or points to uninitialized data, causing a trap [H-8, H-2].
    causal-factors:
      - component_wrap.rs hardcodes CanonicalOption::Memory(0) at line 899
      - No per-import metadata (memory index, realloc index) passed from
        merger to wrapper
      - Single-memory assumption baked into stubs module construction
    process-model-flaw: >
      Wrapper assumes all imports use memory 0 because the original
      single-component wrapping only had one memory.
    status: fixed
    fix: >
      Multi-memory WASI import lowering (PR #20). Per-import Memory(N)
      and Realloc(N) via import_memory_indices/import_realloc_indices.

  - id: LS-M-5
    title: Multiply-instantiated module produces corrupt merged output
    uca: UCA-M-9
    hazards: [H-10, H-1]
    type: inadequate-process-model
    scenario: >
      A component instantiates the same core module twice (e.g., a shared
      utility module used by two sub-components). The merger processes the
      module index twice in its instantiation loop, creating duplicate
      function/memory/table entries. The second instance's functions receive
      index offsets computed from the first instance's space, but reference
      the first instance's memory. Cross-instance calls silently access
      wrong memory regions. Data corruption occurs without any error or
      trap [H-1, H-2, H-3].
    causal-factors:
      - Merger iterates instantiation_order without checking for duplicate
        module indices
      - No validation that each core module is instantiated at most once
      - Index maps (function_index_map, memory_index_map) silently
        overwrite entries for duplicate module indices
    process-model-flaw: >
      Merger assumes each module index appears at most once in the
      instantiation order. The component model spec allows multiple
      instantiations of the same module (with different import wiring),
      but the merger's index-space merging model does not account for this.
    status: open
    priority: critical

  - id: LS-M-6
    title: component-provenance section mis-attributes fused functions
    uca: UCA-M-9
    hazards: [H-1]
    type: inadequate-control-algorithm
    scenario: >
      The `component-provenance` custom section (#192) maps each
      defined function in the fused module to a back-pointer
      `{ component_id, originating_func_idx }`. If the emitter
      builds those entries from the wrong source — using a stale
      `MergedFunction.origin`, the wrong import-count offset for the
      `fused_func_idx` calculation, or a `component_id` lookup that
      picks the wrong slot in `self.components` — the
      cross-repo consumer (`pulseengine/scry`'s sound abstract
      interpreter, DD-002) projects its Component-Model invariants
      onto the wrong fused-module location. Scry then reports
      "function F is safe" about the wrong F, and any downstream
      witness MC/DC or sigil-attested decision relying on that
      claim is silently de-grounded [H-1]. The hazard is invisible
      because the fused module still runs correctly — only the
      paper-trail of invariants is wrong.
    causal-factors:
      - >-
        `fused_func_idx` is computed as
        `import_counts.func + defined_idx`; an off-by-one against
        the import-count would shift every entry by one
      - >-
        `MergedFunction.origin` is set by merger.rs and never
        mutated, but adapter trampolines inserted by
        `wire_adapter_indices` could in principle change function
        slots if the wiring step ever stopped preserving origin
        tuples
      - >-
        `component_id` falls back to `component-<idx>` for
        flattened sub-components without a name from
        `add_component_named`; if `flatten_nested_components`
        reorders the slice without updating origins, the fallback
        names would silently rotate
    process-model-flaw: >
      The model assumes "the data is already there, just preserve
      it" — which is true for the *origin* tuples, but the
      `fused_func_idx` and `component_id` fields are *derived* at
      emit time from the merged module's import-count and the
      caller's component slice. A future refactor that changes the
      import-count semantics or the flattening order without
      updating the emitter would silently mis-attribute.
    status: approved
    priority: high
    fix: >
      Integration test
      `meld-core::tests::component_provenance::*` (6 cases) pins
      the contract end-to-end: section is present by default,
      decodes via standard wasmparser, every entry's
      `fused_func_idx` is distinct, every `component_id` is
      non-empty and matches either the user-supplied name or the
      `component-<idx>` positional fallback, and the
      `fused_module_sha256` claim verifies against the
      bytes-without-the-two-meld-authored-sections (consumer
      verification recipe). Plus 5 unit tests pin the JSON
      round-trip, version-field stability, and SHA-256 helper
      canonical value.
