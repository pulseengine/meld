name: Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: [self-hosted, linux, x64, rust-cpu]
            use_cross: false
          # Stays on ubuntu-latest: `cross` launches a Docker container;
          # podman-docker compat shim on smithy is untested for cross images.
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          # Stays on macos-14: smithy is Linux x86_64 only.
          - target: x86_64-apple-darwin
            runner: macos-14
            use_cross: false
          # Stays on macos-14: smithy is Linux x86_64 only.
          - target: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/meld meld-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meld-${{ matrix.target }}
          path: meld-${{ matrix.target }}

  release:
    name: Release
    needs: build
    runs-on: [self-hosted, linux, x64, light]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: meld-*
