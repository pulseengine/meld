name: Fuzz Smoke

# 60-second-per-target smoke run. Catches regressions that crash a fuzz
# target within the first minute. NOT a substitute for an overnight or
# CI-fleet fuzz campaign — dedicated long-running infrastructure (e.g.
# OSS-Fuzz, ClusterFuzzLite) is the right home for that.
#
# This job is currently informational (continue-on-error: true) because
# cargo-fuzz requires nightly Rust and the project does not yet pin a
# nightly version into its standard matrix. Once nightly is wired in,
# flip continue-on-error to false to make the smoke gate enforcing.
#
# Security note: every `run:` step below uses values that come exclusively
# from the workflow file itself (the matrix is hardcoded). No untrusted
# event payloads (issue/PR titles, commit messages, branch refs from
# forks, etc.) are interpolated into shell commands. If you add steps
# that consume `github.event.*` data, route it through `env:` first.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz-smoke:
    name: Fuzz smoke (${{ matrix.target }})
    runs-on: [self-hosted, linux, x64, rust-cpu]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_parse_component
          - fuzz_resolver_terminates
          - fuzz_merger_idempotent
          - fuzz_fusion_roundtrip
    env:
      FUZZ_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      # Do NOT install the `x86_64-unknown-linux-musl` toolchain target.
      # musl statically links libc, which is incompatible with the
      # AddressSanitizer that `cargo-fuzz` injects via
      # `-Z sanitizer=address`. The build then fails with
      #   error: sanitizer is incompatible with statically linked libc,
      #          disable it using `-C target-feature=-crt-static`
      # cargo-fuzz's `--release` reuse path can pick up a musl target if
      # a stale `fuzz/target/` is restored from cache. We default to the
      # host gnu target (no `targets:` line, no `--target` flag on
      # `cargo fuzz run`) so the sanitizer stays compatible.
      # Inputs here are workflow-static (no untrusted event payloads):
      # `matrix.target` is hardcoded in the strategy matrix and
      # `runner.os` is GitHub-provided runner metadata.
      # See pulseengine/meld#168 for the recurring failure pattern.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache fuzz target build
        uses: actions/cache@v4
        with:
          path: |
            fuzz/target/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          # Cache key version-bumped to `v2-` once to bust any snapshots
          # taken while the toolchain still had musl as an extra target
          # (#168). Bump again if a future change should invalidate all
          # existing caches in lock-step.
          key: ${{ runner.os }}-fuzz-v2-${{ matrix.target }}-${{ hashFiles('fuzz/Cargo.toml', 'meld-core/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-fuzz-v2-${{ matrix.target }}-

      - name: Run target for 60 s
        run: cargo +nightly fuzz run --release "$FUZZ_TARGET" -- -max_total_time=60

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
